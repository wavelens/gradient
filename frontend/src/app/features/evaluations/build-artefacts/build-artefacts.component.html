<gr-page-layout title="Build Artefacts" [subtitle]="buildShortId()">
  <button
    slot="actions"
    pButton
    icon="pi pi-arrow-left"
    label="Back"
    severity="secondary"
    (click)="goBack()"
  ></button>

  @if (loading()) {
    <app-loading-spinner message="Loading artefacts..." />
  } @else if (artefacts().length === 0) {
    <app-empty-state
      icon="inventory_2"
      title="No artefacts available"
      message="This build did not produce any artefacts via hydra-build-products."
    />
  } @else {
    <div class="gr-compact-list">
      @for (artefact of artefacts(); track artefact.name) {
        <div class="gr-compact-row">
          <span class="gr-file-type">{{ fileTypeLabel(artefact.file_type) }}</span>
          <span class="gr-compact-row__name">{{ artefact.name }}</span>
          @if (artefact.size !== undefined) {
            <span class="gr-compact-row__size text-secondary">{{ formatSize(artefact.size) }}</span>
          }
          <a
            class="gr-download-btn"
            [href]="downloadUrl(artefact)"
            [title]="'Download ' + artefact.name"
          >
            <span class="material-symbols-outlined">download</span>
            <span>Download</span>
          </a>
        </div>
      }
    </div>
  }
</gr-page-layout>
