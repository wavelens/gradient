<div class="closure-page">
  @if (loading()) {
    <div class="full-loading">
      <app-loading-spinner message="Loading closure…" />
    </div>
  } @else if (errorMsg()) {
    <div class="error-state">
      <span class="material-symbols-outlined">error</span>
      <p>{{ errorMsg() }}</p>
      <button pButton label="Go Back" severity="secondary" (click)="goBack()"></button>
    </div>
  } @else {
    <div class="closure-header">
      <div class="header-left">
        <button class="icon-btn" (click)="goBack()" title="Back">
          <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <div class="header-info">
          <div class="header-title">
            <span class="header-name">{{ rootName() }}</span>
            <span class="total-badge">{{ totalLabel() }}</span>
          </div>
          <div class="header-meta">
            <span>{{ nodeCount() }} packages in closure</span>
            @if (truncated()) {
              <span class="sep">·</span>
              <span class="warn">large closure — node list truncated</span>
            }
          </div>
        </div>
      </div>

      <div class="header-controls">
        <button class="ctrl-btn" (click)="zoomIn()" title="Zoom in">
          <span class="material-symbols-outlined">add</span>
        </button>
        <button class="ctrl-btn" (click)="zoomOut()" title="Zoom out">
          <span class="material-symbols-outlined">remove</span>
        </button>
        <button class="ctrl-btn" (click)="fitToScreen()" title="Fit to screen">
          <span class="material-symbols-outlined">fit_screen</span>
        </button>
      </div>
    </div>

    <svg #svgEl class="sankey-svg"
      (wheel)="onWheel($event)"
      (mousedown)="onSvgMousedown($event)"
      (mousemove)="onMousemove($event)"
      (mouseup)="onMouseup()"
      (mouseleave)="onMouseup()"
    >
      <g #graphEl [attr.transform]="transform()"></g>
    </svg>
  }
</div>
