<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <img src="/images/logo.svg" alt="Gradient" class="auth-logo" />
      <h1>Sign In</h1>
      <p class="text-secondary">Welcome back to Gradient</p>
    </div>

    @if (errorMessage()) {
      <gr-message-banner type="error">{{ errorMessage() }}</gr-message-banner>
    }

    @if (!oidcRequired) {
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
        <gr-form-field
          label="Username or Email"
          for="username"
          [required]="true"
          [control]="loginForm.controls['username']"
        >
          <input
            pInputText
            id="username"
            formControlName="username"
            class="w-full"
            placeholder="Enter your username or email"
            autocomplete="username"
          />
        </gr-form-field>

        <gr-form-field
          label="Password"
          for="password"
          [required]="true"
          [control]="loginForm.controls['password']"
        >
          <gr-password-input
            id="password"
            [control]="$any(loginForm.controls['password'])"
            placeholder="Enter your password"
            autocomplete="current-password"
          />
        </gr-form-field>

        <div class="auth-checkbox">
          <p-checkbox formControlName="rememberMe" [binary]="true" inputId="remember-me" />
          <label for="remember-me">Remember me</label>
        </div>

        <button
          pButton
          type="submit"
          class="auth-action"
          [label]="loading() ? 'Signing in...' : 'Sign In'"
          [disabled]="!loginForm.valid || loading()"
          [loading]="loading()"
        ></button>
      </form>
    }

    @if (oidcEnabled) {
      @if (!oidcRequired) {
        <div class="auth-divider"><span>OR</span></div>
      }
      <button
        pButton
        type="button"
        class="auth-action"
        severity="secondary"
        icon="pi pi-sign-in"
        label="Sign in with SSO"
        (click)="loginWithOIDC()"
      ></button>
    }

    @if (!registrationDisabled) {
      <div class="auth-footer">
        Don't have an account?
        <a routerLink="/account/register">Sign up</a>
      </div>
    }
  </div>
</div>
