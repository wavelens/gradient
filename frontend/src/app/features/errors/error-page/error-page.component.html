<div class="error-page">
  <div class="error-card">
    <span class="material-symbols-outlined error-icon">{{ meta().icon }}</span>
    <div class="error-code">{{ code() || '' }}</div>
    <h1 class="error-title">{{ meta().title }}</h1>
    <p class="error-description">{{ meta().description }}</p>
    <div class="gr-form-actions">
      <a pButton routerLink="/" label="Go Home"></a>
      @if (meta().retryable) {
        <button pButton severity="secondary" label="Try Again" (click)="retry()"></button>
      }
    </div>
  </div>
</div>
