# Cargo configuration for the Gradient workspace

[build]
# Enable incremental compilation for faster builds
incremental = true
# Cap parallel rustc invocations to keep peak memory bounded on dev machines.
# Cargo.toml has no equivalent - this is the canonical place for the setting.
# `cargo test --workspace` builds dozens of test binaries each pulling in heavy
# transitive deps (`harmonia-*`, `sea-orm`, `git2`); two parallel link steps
# blew past 16 GiB on common dev hardware, so this is pinned to 1.
jobs = 1

# Note: do NOT set `target-cpu=native` here. This file is read by every cargo
# invocation, including release builds packaged via Nix. A binary compiled with
# native targeting on a host that has AES-NI / AVX2 / PCLMULQDQ will SIGILL on
# a deploy host that lacks them, crashing inside `aes_gcm_siv` (e.g. server
# startup state encryption). Developers who want native optimisation for local
# benchmarking should set it in their personal `~/.cargo/config.toml` or via
# `CARGO_BUILD_RUSTFLAGS="-C target-cpu=native"` in their shell.

[alias]
# Custom aliases for common tasks
test-all = "test --workspace --all-features"
test-unit = "test --workspace --lib"
test-integration = "test --workspace --test '*'"
test-doc = "test --workspace --doc"
check-all = "check --workspace --all-targets --all-features"
clippy-all = "clippy --workspace --all-targets --all-features"

# Test with coverage reporting (requires cargo-tarpaulin)
test-coverage = "tarpaulin --workspace --out xml --output-dir coverage"

# Run tests with verbose output for debugging
test-verbose = "test --workspace --all-features -- --nocapture"

# Run specific package tests
test-core = "test -p core"
test-builder = "test -p builder"
test-web = "test -p web"
test-cache = "test -p cache"
test-entity = "test -p entity"
test-migration = "test -p migration"

# Run all tests via script
test-script = "!./test.sh"