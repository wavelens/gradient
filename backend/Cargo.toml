[package]
name = "gradient-server"
version = "1.0.0"
edition = "2024"
license = "AGPL-3.0"
authors = ["Wavelens GmbH <info@wavelens.io>"]
description = "Nix-based Continuous Integration System"
repository = "https://github.com/wavelens/gradient"

[workspace]
members = [".", "core", "builder", "web", "cache", "entity", "migration", "nix-daemon"]
resolver = "2"

[workspace.dependencies]
# Internal crates
builder   = { path = "builder" }
cache     = { path = "cache" }
core      = { path = "core", package = "core" }
entity    = { path = "entity" }
migration = { path = "migration" }
nix-daemon = { path = "nix-daemon" }
web       = { path = "web" }

# External
anyhow           = "1.0"
async-stream     = "0.3"
async-trait      = "0.1"
base64           = "0.22"
chrono           = "0.4"
futures          = "0.3"
git2             = "0.20"
hmac             = "0.13"
mockall          = "0.14"
rand             = "0.9"
reqwest          = { version = "0.13", features = ["json"] }
sea-orm          = { version = "1.1", features = ["json-array", "mock", "postgres-array", "runtime-tokio", "sqlx-postgres", "with-json", "with-uuid"] }
sea-orm-migration = { version = "1.1", features = ["with-uuid", "with-chrono", "with-json", "sqlx-postgres", "runtime-tokio"] }
sentry           = "0.47"
serde            = { version = "1", features = ["derive"] }
serde_json       = "1.0"
sha2             = "0.11"
thiserror        = "2.0"
tokio            = { version = "1.50", features = ["rt-multi-thread"] }
tokio-test       = "0.4"
tracing          = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
uuid             = { version = "1.23", features = ["fast-rng", "macro-diagnostics", "v4"] }
zstd             = "0.13"

[dependencies]
builder          = { workspace = true }
cache            = { workspace = true }
clap             = { version = "4.6", features = ["derive"] }
gradient-core    = { path = "core", package = "core" }
sentry           = { workspace = true }
tokio            = { workspace = true, features = ["process"] }
tracing          = { workspace = true }
tracing-subscriber = { workspace = true }
web              = { workspace = true }
