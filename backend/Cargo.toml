[package]
name = "gradient-server"
version = "1.0.0"
edition = "2024"
license = "AGPL-3.0"
authors = ["Wavelens GmbH <info@wavelens.io>"]
description = "Nix-based Continuous Integration System"
repository = "https://github.com/wavelens/gradient"

[workspace]
members = [".", "core", "evaluator", "builder", "web", "cache", "entity", "migration", "proto", "test-support", "worker"]
resolver = "2"

[workspace.dependencies]
# Internal crates
builder      = { path = "builder" }
cache        = { path = "cache" }
core         = { path = "core", package = "core" }
entity       = { path = "entity" }
evaluator    = { path = "evaluator" }
migration    = { path = "migration" }
proto        = { path = "proto" }
test-support = { path = "test-support" }
worker       = { path = "worker" }
web          = { path = "web" }

# External
anyhow           = "1.0"
async-stream     = "0.3"
async-trait      = "0.1"
base64           = "0.22"
bytes            = "1.11"
chrono           = "0.4"
futures              = "0.3"
tokio-tungstenite    = { version = "0.27", features = ["native-tls"] }
harmonia-nar           = { git = "https://github.com/nix-community/harmonia.git", tag = "harmonia-v3.0.0" }
harmonia-protocol      = { git = "https://github.com/nix-community/harmonia.git", tag = "harmonia-v3.0.0" }
harmonia-store-core    = { git = "https://github.com/nix-community/harmonia.git", tag = "harmonia-v3.0.0" }
harmonia-store-remote  = { git = "https://github.com/nix-community/harmonia.git", tag = "harmonia-v3.0.0" }
harmonia-utils-base-encoding = { git = "https://github.com/nix-community/harmonia.git", tag = "harmonia-v3.0.0" }
harmonia-utils-hash    = { git = "https://github.com/nix-community/harmonia.git", tag = "harmonia-v3.0.0" }
harmonia-utils-io      = { git = "https://github.com/nix-community/harmonia.git", tag = "harmonia-v3.0.0" }
git2             = "0.20"
libc             = "0.2"
hmac             = "0.13"
nix-bindings     = { git = "https://github.com/NotAShelf/nix-bindings" }
mockall          = "0.14"
object_store     = { version = "0.13", features = ["aws"] }
rand             = "0.9"
reqwest          = { version = "0.13", features = ["json"] }
ring             = "0.17"
rkyv             = "0.8"
sea-orm          = { version = "1.1", features = ["json-array", "mock", "postgres-array", "runtime-tokio", "sqlx-postgres", "with-json", "with-uuid"] }
sea-orm-migration = { version = "1.1", features = ["with-uuid", "with-chrono", "with-json", "sqlx-postgres", "runtime-tokio"] }
sentry           = "0.47"
serde            = { version = "1", features = ["derive"] }
serde_json       = "1.0"
sha2             = "0.11"
thiserror        = "2.0"
tokio            = { version = "1.50", features = ["rt-multi-thread"] }
tokio-test       = "0.4"
tracing          = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
uuid             = { version = "1.23", features = ["fast-rng", "macro-diagnostics", "v4"] }
zstd             = "0.13"

[dependencies]
builder          = { workspace = true }
cache            = { workspace = true }
clap             = { version = "4.6", features = ["derive"] }
evaluator        = { workspace = true }
gradient-core    = { path = "core", package = "core" }
sentry           = { workspace = true }
tokio            = { workspace = true, features = ["process"] }
tracing          = { workspace = true }
tracing-subscriber = { workspace = true }
web              = { workspace = true }

[patch.crates-io]
harmonia-nar             = { git = "https://github.com/nix-community/harmonia.git", tag = "harmonia-v3.0.0" }
harmonia-protocol        = { git = "https://github.com/nix-community/harmonia.git", tag = "harmonia-v3.0.0" }
harmonia-protocol-derive = { git = "https://github.com/nix-community/harmonia.git", tag = "harmonia-v3.0.0" }
harmonia-store-core      = { git = "https://github.com/nix-community/harmonia.git", tag = "harmonia-v3.0.0" }
harmonia-utils-base-encoding = { git = "https://github.com/nix-community/harmonia.git", tag = "harmonia-v3.0.0" }
harmonia-utils-hash      = { git = "https://github.com/nix-community/harmonia.git", tag = "harmonia-v3.0.0" }
harmonia-utils-io        = { git = "https://github.com/nix-community/harmonia.git", tag = "harmonia-v3.0.0" }
