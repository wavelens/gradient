# Pins the toolchain for rustup / non-nix contributors. The nix devShell
# (flake.lock) remains the source of truth; keep this channel in sync with it.
[toolchain]
channel    = "1.95.0"
components = ["rustfmt", "clippy"]
profile    = "minimal"
