[package]
name = "connector"
version = "1.3.0"
edition = "2024"
publish = false
license = "AGPL-3.0-only"
authors = ["Wavelens GmbH <info@wavelens.io>"]

[lib]
name = "connector"
path = "src/lib.rs"

[dependencies]
bytes = "1"
futures = "0.3"
reqwest = { version = "0.13", features = ["json", "multipart", "query"] }
reqwest-streams = { version = "0.17", features=["json"] }
rustls = { version = "0.23", default-features = false, features = ["std", "aws-lc-rs", "tls12"] }
rustls-native-certs = "0.8"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
webpki-roots = { version = "1.0", default-features = false }

[dev-dependencies]
wiremock = "0.6"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
