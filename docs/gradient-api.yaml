openapi: 3.1.1
info:
  title: Gradient API
  description: |-
    Gradient is a Nix-based Continuous Integration system. It evaluates Nix flakes,
    schedules derivation builds across remote machines, and exposes build artefacts
    through an integrated binary cache.

    ## Authentication

    Most endpoints require authentication. Three methods are accepted:

    | Method | How to send | How to obtain |
    |---|---|---|
    | JWT (cookie) | `jwt_token` httpOnly cookie | Set automatically on login |
    | JWT (header) | `Authorization: Bearer <token>` | `POST /auth/basic/login` or OIDC flow |
    | API Key | `Authorization: Bearer GRAD<key>` | `POST /user/keys` |

    Cookie auth is the default for browser clients - the `jwt_token` cookie is set
    by the login and OIDC-callback endpoints and cleared on logout. The
    `Authorization` header is accepted as a fallback (e.g. for CI/scripts).

    ### Artefact downloads

    `GET /builds/{build}/download/{filename}` serves build artefacts declared in
    `nix-support/hydra-build-products`. Access is granted when any of the following
    conditions is met:

    - The owning organisation is **public** - no credentials required.
    - A short-lived (1 h) **download token** is supplied via `?token=<download_token>`.
      Obtain one from `GET /builds/{build}/download-token` while authenticated.
      Tokens are scoped to a single build and are safe to embed in URLs.
    - A valid session (`jwt_token` cookie or `Authorization: Bearer` header) belonging
      to a member of the owning organisation.

    ## Rate limiting

    All HTTP endpoints enforce a per-client-IP token-bucket rate limit. The
    limiter keys solely on client IP, so authenticated and anonymous requests
    share the same tier. Clients that exceed their bucket receive HTTP
    `429 Too Many Requests`. The tier depends on the route:

    | Tier | Routes | Refill | Burst |
    |---|---|---|---|
    | auth | `/auth/basic/login`, `/auth/basic/register`, `/auth/check-username`, `/auth/verify-email`, `/auth/resend-verification`, `/auth/oauth/*`, `/auth/oidc/*` | 1 req / 6 s | 5 |
    | webhook | `/hooks/*` | 1 req / s | 30 |
    | cache | `/cache/{cache}/*` (public NAR surface) and `/cache/{cache}/proto` | 1 req / 20 ms | 3000 |
    | cache-inspect | `/cache/{cache}/{ls,serve}/*` | 1 req / 333 ms | 180 |
    | cache-log | `/cache/{cache}/log/*` | 1 req / 333 ms | 900 |
    | default | everything else | 1 req / 200 ms | 150 |

    Client IP is taken from `X-Forwarded-For` / `X-Real-IP` (deployments are
    expected behind a reverse proxy), falling back to the connection peer IP.

    ## Request Tracing

    Every response carries an `x-request-id` header. If the client (or an
    upstream reverse proxy) supplies an `x-request-id` on the request, it is
    preserved verbatim; otherwise the server mints a UUID v7. Use this id to
    correlate client-side traces with server logs - every log line emitted
    while the request is in flight (handler, DB, spawned cleanup tasks)
    carries the same id.

    ## Common Response Envelope

    Every JSON response is wrapped in a standard envelope:
    ```json
    { "error": false, "message": <payload> }
    ```
    On errors `"error"` is `true` and `"message"` contains the error description.

    ## Nix Binary Cache

    The integrated Nix binary cache lives outside `/api/v1`. Configure Nix with:
    ```
    substituters = https://gradient.example.com/cache/mycache
    trusted-public-keys = gradient.example.com-mycache:...
    ```
    The public key is returned by `GET /api/v1/caches/{cache}/public-key`.

    ## State Management

    Objects whose `managed` field is `true` are controlled by the NixOS module
    configuration and cannot be mutated through the API.
  contact:
    email: info@wavelens.io
  license:
    name: AGPL-3.0-only
    url: https://www.gnu.org/licenses/agpl-3.0.en.html
  version: 1.3.0

externalDocs:
  description: Gradient documentation
  url: https://wavelens.github.io/gradient

servers:
  - url: http://127.0.0.1:3000/api/v1
    description: Local development server
  - url: https://gradient.example.com/api/v1
    description: Production server

tags:
  - name: general
    description: Health check and server configuration
  - name: board
    description: Job Board - metric queries, live dispatched jobs, workers, scoring, and expensive builds
  - name: auth
    description: Authentication - login, register, OAuth/OIDC
  - name: user
    description: Current user profile, API keys, and settings
  - name: orgs
    description: Organization management, members, SSH keys, cache subscriptions
  - name: projects
    description: Project management and evaluation triggers
  - name: triggers
    description: Per-project evaluation triggers (polling, reporter_push, reporter_pull_request, time)
  - name: flake-inputs
    description: Per-project flake input URL overrides applied during evaluation fetch.
  - name: evals
    description: Evaluation details, status, and log streaming
  - name: builds
    description: Build details, logs, artefact downloads, and dependency graph
  - name: workers
    description: Worker registration and live status (proto workers connected via WebSocket)
  - name: caches
    description: Binary cache management
  - name: commits
    description: Commit records
  - name: actions
    description: Per-project Actions (Send Mail, Send Web Request, Forge Status Report)
  - name: forge-webhooks
    description: Incoming forge webhooks (external forges → Gradient push triggers)
  - name: integrations
    description: Per-organization named forge integrations (inbound HMAC secrets + outbound API credentials)
  - name: admin
    description: Server-wide administrative endpoints. All routes require the caller to have the `superuser` flag.
  - name: scim
    description: SCIM 2.0 instance-level provisioning (Users + Groups), bearer-token authenticated, mounted at `/scim/v2` only when SCIM is enabled.

security:
  - bearerAuth: []

paths:

  # ── General ──────────────────────────────────────────────────────────────────

  /health:
    get:
      tags: [general]
      summary: Health check
      description: Returns `200 ALIVE` when the server is running. Does not require authentication.
      security: []
      operationId: getHealth
      responses:
        '200':
          description: Server is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
              example:
                error: false
                message: "200 ALIVE"

  /metrics:
    get:
      tags: [general]
      summary: Prometheus metrics
      description: |-
        Prometheus exposition endpoint. Disabled (404) until an operator
        configures `GRADIENT_METRICS_TOKEN_FILE`. Requires a Bearer token
        matching the contents of that file. Returns the standard Prometheus
        text format (version 0.0.4) with build, evaluation, scheduler, and
        cache metrics.
      operationId: getMetrics
      security:
        - metricsAuth: []
      responses:
        '200':
          description: Prometheus exposition (text/plain; version=0.0.4)
          content:
            text/plain:
              schema:
                type: string
                example: |-
                  # HELP gradient_info Build/version metadata; value is always 1.
                  # TYPE gradient_info gauge
                  gradient_info{version="1.1.1"} 1
        '401':
          description: Missing or invalid bearer token
        '404':
          description: Metrics endpoint not configured on this server
        '429':
          description: Rate limit exceeded

  /config:
    get:
      tags: [general]
      summary: Server configuration
      description: Returns feature flags for the frontend (OIDC enabled, registration disabled, email verification).
      security: []
      operationId: getConfig
      responses:
        '200':
          description: Server configuration
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/ServerConfig'
              example:
                error: false
                message:
                  oidc_enabled: false
                  registration_enabled: false
                  email_verification_enabled: false
                  quic: false
                  create_org: everyone
                  create_cache: everyone

  /proto:
    get:
      tags: [general]
      summary: Binary WebSocket protocol endpoint
      description: |-
        Upgrades the connection to a WebSocket carrying rkyv-encoded binary
        frames. Only available when `GRADIENT_DISCOVERABLE=true`.

        **Protocol flow**
        1. Client sends `ClientMessage::InitConnection { version, features }`.
        2. Server responds with `ServerMessage::InitAck { version, features }`
           containing the negotiated protocol version and activated feature flags.
        3. Further message types will be added as the protocol evolves.

        Messages are raw rkyv bytes sent as WebSocket binary frames.
        The `/proto` endpoint is always active.
      security: []
      operationId: protoWebSocket
      responses:
        '101':
          description: Switching Protocols - WebSocket upgrade successful
        '404':
          description: Protocol endpoint is disabled (`GRADIENT_DISCOVERABLE=false`)

  # ── Auth ─────────────────────────────────────────────────────────────────────

  /auth/basic/register:
    post:
      tags: [auth]
      summary: Register a new user
      description: |-
        Creates a new user account. Fails if registration is disabled (OIDC-only mode)
        or if the username/email is already taken. When email verification is enabled,
        a verification email is sent and login is blocked until the address is confirmed.
      security: []
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MakeUserRequest'
            example:
              username: alice
              name: Alice Example
              email: alice@example.com
              password: "correct-horse-battery-staple"
      responses:
        '200':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
              example:
                error: false
                message: "User 3fa85f64-5717-4562-b3fc-2c963f66afa6 created successfully."
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /auth/basic/login:
    post:
      tags: [auth]
      summary: Login with username/password
      description: |-
        Validates credentials and returns a signed JWT. Pass the token as
        `Authorization: Bearer <token>` on subsequent requests.
        `loginname` accepts either the username or the email address.
        Set `remember_me: true` for a long-lived token.
      security: []
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MakeLoginRequest'
            example:
              loginname: alice
              password: "correct-horse-battery-staple"
              remember_me: false
      responses:
        '200':
          description: JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
              example:
                error: false
                message: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/check-username:
    post:
      tags: [auth]
      summary: Check username availability
      description: |-
        Returns `error: false` if the username is valid and not taken, `error: true` otherwise (non-2xx status is not used - always inspect the `error` field).
      security: []
      operationId: checkUsername
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckUsernameRequest'
      responses:
        '200':
          description: Availability result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
              examples:
                available:
                  value: {error: false, message: "Username is available"}
                taken:
                  value: {error: true, message: "Username is already taken"}

  /auth/verify-email:
    get:
      tags: [auth]
      summary: Verify email address
      description: Consumes the one-time token sent in the verification email. Only available when `email_verification_enabled` is true.
      security: []
      operationId: verifyEmail
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: One-time verification token from the email
      responses:
        '200':
          description: Email verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/resend-verification:
    post:
      tags: [auth]
      summary: Resend verification email
      description: Issues a fresh verification token and sends a new email. Only available when email verification is enabled.
      security: []
      operationId: resendVerification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckUsernameRequest'
      responses:
        '200':
          description: Email sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /auth/oauth/authorize:
    get:
      tags: [auth]
      summary: OAuth2 callback (GET)
      description: |-
        Handles the authorization code returned by the OAuth2/OIDC provider. Verifies the
        `state` parameter against the `oidc_csrf` cookie set by `POST /auth/oauth/authorize`,
        exchanges the code for tokens, verifies the ID token signature against the provider's
        JWKS, and binds the session to the user identified by `(iss, sub)`.
      security: []
      operationId: oauthAuthorizeGet
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: Authorization code from the OAuth2 provider
        - name: state
          in: query
          required: true
          schema:
            type: string
          description: Opaque CSRF state value previously issued via `POST /auth/oauth/authorize`
      responses:
        '200':
          description: JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [auth]
      summary: Get OAuth2 authorization URL
      description: |-
        Returns the authorization URL to redirect the user to for OIDC login and sets a
        short-lived `oidc_csrf` cookie carrying the signed `state` and `nonce` values that
        must be presented on the callback. Requires OIDC to be enabled.
      security: []
      operationId: oauthAuthorizePost
      responses:
        '200':
          description: Authorization URL
          headers:
            Set-Cookie:
              schema:
                type: string
                example: "oidc_csrf=<jwt>; HttpOnly; SameSite=Lax; Path=/; Max-Age=600"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
              example:
                error: false
                message: "https://accounts.example.com/oauth2/auth?client_id=..."
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/oidc/login:
    get:
      tags: [auth]
      summary: OIDC login redirect
      description: |-
        Redirects the browser to the OIDC provider's authorization endpoint (HTTP 302) using
        PKCE (S256), and sets a short-lived `oidc_csrf` cookie carrying the signed `state`,
        `nonce`, and PKCE verifier that must be returned on the callback.
      security: []
      operationId: oidcLogin
      responses:
        '302':
          description: Redirect to OIDC provider
          headers:
            Location:
              schema:
                type: string
                format: uri
            Set-Cookie:
              schema:
                type: string
                example: "oidc_csrf=<jwt>; HttpOnly; SameSite=Lax; Path=/; Max-Age=600"

  /auth/oidc/callback:
    get:
      tags: [auth]
      summary: OIDC callback
      description: |-
        Handles the OIDC provider redirect. Verifies the `state` parameter against the
        `oidc_csrf` cookie, exchanges the authorization code for tokens, verifies the ID
        token signature using the provider's JWKS (validating `iss`, `aud`, `exp`, and
        `nonce`), and binds the session to the user identified by `(iss, sub)`. Sets the
        `jwt_token` session cookie and clears `oidc_csrf`.
      security: []
      operationId: oidcCallback
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        '302':
          description: Redirect to frontend with session cookie set
          headers:
            Location:
              schema:
                type: string
                example: "/account/oidc-callback"
            Set-Cookie:
              schema:
                type: string
                example: "jwt_token=<jwt>; HttpOnly; SameSite=Strict; Path=/"

  /auth/logout:
    post:
      tags: [auth]
      summary: Logout
      description: Invalidates the current session (no-op for stateless JWTs; present for API completeness).
      operationId: logout
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
              example:
                error: false
                message: "Logout Successfully"

  /auth/cli/start:
    post:
      tags: [auth]
      summary: Start a CLI device-authorization flow
      description: |-
        Mints a `device_code` (returned once, opaque to the server thereafter) and a short,
        human-friendly `user_code` that the CLI shows in the terminal and the user confirms
        in the browser at `verification_uri_complete`. The CLI polls `/auth/cli/poll` until
        the browser-side flow completes.
      security: []
      operationId: cliDeviceStart
      responses:
        '200':
          description: Device flow started
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseEnvelope'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/CliDeviceStartResponse'

  /auth/cli/poll:
    post:
      tags: [auth]
      summary: Poll a pending CLI device authorization
      description: |-
        Exchanges a `device_code` for a session token once the browser-side flow has been
        approved. Returns `cli_auth_pending` while the user hasn't yet clicked Authorize,
        `cli_auth_denied` if they explicitly denied, and `cli_auth_expired` once the device
        code lifetime elapses.
      security: []
      operationId: cliDevicePoll
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CliDevicePollRequest'
      responses:
        '200':
          description: Authorized - session token returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '400':
          description: Pending, denied, or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/cli/info:
    get:
      tags: [auth]
      summary: Look up a pending CLI device authorization
      description: Returns metadata about a pending `user_code` so the browser-side UI can confirm what is being authorized.
      operationId: cliDeviceInfo
      parameters:
        - name: user_code
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Device info
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseEnvelope'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/CliDeviceInfoResponse'

  /auth/cli/authorize:
    post:
      tags: [auth]
      summary: Authorize a pending CLI device session
      description: |-
        Marks the device authorization identified by `user_code` as approved, minting a JWT
        session token (remember_me=true, 30-day lifetime) bound to the calling user. The
        token is returned to the CLI on its next `/auth/cli/poll` request.
      operationId: cliDeviceAuthorize
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CliDeviceAuthorizeRequest'
      responses:
        '200':
          description: Authorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'

  /auth/cli/deny:
    post:
      tags: [auth]
      summary: Deny a pending CLI device session
      operationId: cliDeviceDeny
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CliDeviceAuthorizeRequest'
      responses:
        '200':
          description: Denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'

  # ── User ─────────────────────────────────────────────────────────────────────

  /user:
    get:
      tags: [user]
      summary: Get current user
      description: Returns the id, username, display name, and email of the authenticated user.
      operationId: getUser
      responses:
        '200':
          description: User info
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/UserInfoResponse'
              example:
                error: false
                message:
                  id: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                  username: alice
                  name: Alice Example
                  email: alice@example.com
                  superuser: false
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      tags: [user]
      summary: Delete current user
      description: |-
        Permanently deletes the authenticated user and all associated data.
        Requires re-authentication: password-auth users must supply their
        current password in `password`; OIDC-auth users must echo their
        username in `confirm_username`.
      operationId: deleteUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteUserRequest'
      responses:
        '200':
          description: User deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Password / username confirmation missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'

  /user/keys:
    get:
      tags: [user]
      summary: List API keys
      description: |-
        Returns all API keys belonging to the authenticated user, including
        creation, last-used, expiry, and revocation timestamps.
      operationId: getUserKeys
      responses:
        '200':
          description: List of API keys
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        type: array
                        items:
                          $ref: '#/components/schemas/ApiKeyInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [user]
      summary: Create API key
      description: |-
        Creates a new API key. The full key (prefixed with `GRAD`) is returned once -
        it cannot be retrieved again. Use it as `Authorization: Bearer GRAD<key>`.
        Pass `expires_in_days` to make the key auto-expire; omit for no expiry.
        A cache-pinned key may only grant cache permissions the caller already
        holds; members of an organization subscribed to the cache are treated as
        read-only, so they can mint read-only cache keys.
      operationId: createUserKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApiKeyRequest'
      responses:
        '200':
          description: New API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
              example:
                error: false
                message: "GRADabcdef1234567890abcdef1234567890"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [user]
      summary: Delete API key
      description: Deletes the API key with the given name. State-managed keys cannot be deleted.
      operationId: deleteUserKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiKeyRequest'
      responses:
        '200':
          description: Key deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /user/keys/permissions:
    get:
      tags: [user]
      summary: List API-key permission catalogue
      description: |-
        Returns the full set of capabilities a user-managed API key may grant.
        Used by the create / edit dialog to populate the permission checkbox list.
      operationId: getUserKeyPermissions
      responses:
        '200':
          description: Permission catalogue
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        type: object
                        required: [available_permissions, availableCache]
                        properties:
                          available_permissions:
                            type: array
                            items:
                              type: object
                              required: [id, mutating]
                              properties:
                                id: { type: string }
                                mutating: { type: boolean }
                          availableCache:
                            type: array
                            description: Catalogue of cache-scoped capabilities for cache-pinned API keys.
                            items:
                              type: object
                              required: [id, mutating]
                              properties:
                                id:
                                  $ref: '#/components/schemas/CachePermissionId'
                                mutating:
                                  type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'

  /user/keys/{api_id}:
    patch:
      tags: [user]
      summary: Update an API key's configurable options
      description: |-
        Edit the key's name, permission set, or organization pin in place.
        Permissions replace the existing set wholesale. State-managed keys
        cannot be edited. Cannot be called from an API-key-authenticated
        request - sessions only.
      operationId: patchUserKey
      parameters:
        - name: api_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchApiKeyRequest'
      responses:
        '200':
          description: Updated key
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/ApiKeyInfo'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /user/keys/{api_id}/revoke:
    post:
      tags: [user]
      summary: Revoke an API key
      description: |-
        Marks the key as revoked without deleting the row, so audit trails are
        preserved. A revoked key fails authentication immediately.
      operationId: revokeUserKey
      parameters:
        - name: api_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Key revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /user/sessions:
    get:
      tags: [user]
      summary: List active sessions
      description: |-
        Returns the caller's non-revoked, non-expired sessions. Each entry
        carries the user-agent and IP captured at login plus a `current` flag
        identifying the session backing this request.
      operationId: getUserSessions
      responses:
        '200':
          description: Active sessions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        type: array
                        items:
                          $ref: '#/components/schemas/SessionInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /user/sessions/{session_id}:
    delete:
      tags: [user]
      summary: Revoke a session
      description: |-
        Revokes a single session, immediately invalidating its JWT. Useful for
        signing out a lost device without changing the password.
      operationId: deleteUserSession
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Session revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /user/audit-log:
    get:
      tags: [user]
      summary: Audit log for the current user
      description: |-
        Paginated list of audit events recorded for the caller (login,
        logout, API-key lifecycle, session revocation, account deletion).
      operationId: getUserAuditLog
      parameters:
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: per_page
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
      responses:
        '200':
          description: Audit entries
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/AuditLogEntry'
                          total:
                            type: integer
                          page:
                            type: integer
                          per_page:
                            type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'

  /user/settings:
    get:
      tags: [user]
      summary: Get user settings
      description: Returns the username, display name, and email of the current user.
      operationId: getUserSettings
      responses:
        '200':
          description: User settings
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/GetUserSettingsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags: [user]
      summary: Update user settings
      description: |-
        Updates one or more user profile fields. Only fields that are present in the
        request body are changed. Managed users (created via NixOS config) cannot be
        modified through the API.
      operationId: patchUserSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchUserSettingsRequest'
      responses:
        '200':
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /user/search:
    get:
      tags: [user]
      summary: Search users by username
      description: Returns up to 10 users whose username contains the given query string. Used for autocomplete in member and ownership dialogs.
      operationId: searchUsers
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Username prefix/substring to search for
      responses:
        '200':
          description: Matching users
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              format: uuid
                            username:
                              type: string
                            name:
                              type: string
              example:
                error: false
                message:
                  - id: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                    username: alice
                    name: Alice Example
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ── Organizations ─────────────────────────────────────────────────────────────

  /orgs:
    get:
      tags: [orgs]
      summary: List organizations
      description: Returns all organizations the current user is a member of.
      operationId: listOrgs
      responses:
        '200':
          description: Organization list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        type: array
                        items:
                          $ref: '#/components/schemas/Organization'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags: [orgs]
      summary: Create organization
      description: Creates a new organization owned by the current user.
      operationId: createOrg
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MakeOrganizationRequest'
            example:
              name: my-org
              display_name: My Organization
      responses:
        '200':
          description: Organization UUID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
              example:
                error: false
                message: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /orgs/available:
    get:
      tags: [orgs]
      summary: Check organization name availability
      description: Returns `true` if no organization with the given name exists, `false` if it is already taken.
      operationId: checkOrgNameAvailable
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
          description: Organization name to check
      responses:
        '200':
          description: Availability result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        type: boolean
              example:
                error: false
                message: true
        '401':
          $ref: '#/components/responses/Unauthorized'

  /orgs/{organization}:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
    get:
      tags: [orgs]
      summary: Get organization
      operationId: getOrg
      responses:
        '200':
          description: Organization details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/Organization'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [orgs]
      summary: Update organization
      description: |
        Updates one or more organization fields. Managed organizations cannot
        be edited via the API. Requires the caller to hold the **admin** role
        in the organization.
      operationId: patchOrg
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchOrganizationRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [orgs]
      summary: Delete organization
      description: |
        Permanently deletes the organization and all its resources. Requires
        the caller to hold the **admin** role in the organization.
      operationId: deleteOrg
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /orgs/{organization}/users:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
    get:
      tags: [orgs]
      summary: List organization members
      operationId: listOrgUsers
      responses:
        '200':
          description: Member list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        type: array
                        items:
                          $ref: '#/components/schemas/StringListItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [orgs]
      summary: Add member
      description: |
        Adds a user to the organization by username. Requires the caller to
        hold the **admin** role in the organization.
      operationId: addOrgUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddUserRequest'
      responses:
        '200':
          description: Member added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    patch:
      tags: [orgs]
      summary: Update member role
      description: |
        Updates the role or permissions of an existing organization member.
        Requires the caller to hold the **admin** role in the organization.
      operationId: patchOrgUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddUserRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [orgs]
      summary: Remove member
      description: |
        Removes a user from the organization. Requires the caller to hold the
        **admin** role in the organization.
      operationId: removeOrgUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemoveUserRequest'
      responses:
        '200':
          description: Member removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /orgs/{organization}/roles:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
    get:
      tags: [orgs]
      summary: List roles available in the organization
      description: |
        Returns the three immutable built-in roles (Admin/Write/View) plus any
        custom roles owned by this organization, along with the catalogue of
        permissions that custom roles may carry.

        Visible to any member of the organization so the add-member UI can
        populate its role dropdown.
      operationId: listOrgRoles
      responses:
        '200':
          description: Role catalogue
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/RoleListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [orgs]
      summary: Create a custom role
      description: |
        Creates a new role scoped to this organization. The caller must hold
        the **manageRoles** permission. The role's permission set is freely
        chosen from the capabilities returned by `GET /orgs/{org}/roles` →
        `available_permissions`. Built-in role names (Admin, Write, View) and
        any name already used by another role in the same org are rejected
        with `409`.
      operationId: createOrgRole
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoleRequest'
      responses:
        '200':
          description: Role created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/RoleResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /orgs/{organization}/roles/{role_id}:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
      - name: role_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Role identifier (UUIDv7).
    get:
      tags: [orgs]
      summary: Fetch a role
      operationId: getOrgRole
      responses:
        '200':
          description: Role
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/RoleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [orgs]
      summary: Update a custom role
      description: |
        Renames a custom role and/or replaces its permission set. The three
        built-in roles (Admin, Write, View) are immutable; attempts to modify
        them return `403`.
      operationId: patchOrgRole
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchRoleRequest'
      responses:
        '200':
          description: Role updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/RoleResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [orgs]
      summary: Delete a custom role
      description: |
        Deletes a custom role. The built-in roles cannot be deleted (`403`).
        A role currently assigned to one or more members cannot be deleted
        until those members are reassigned (`400`).
      operationId: deleteOrgRole
      responses:
        '200':
          description: Role deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BoolResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /orgs/{organization}/ssh:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
    get:
      tags: [orgs]
      summary: Get SSH public key
      description: |-
        Returns the SSH public key for the organization. This key must be added to
        each remote build server's `authorized_keys` to allow Gradient to connect.
      operationId: getOrgSsh
      responses:
        '200':
          description: SSH public key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
              example:
                error: false
                message: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAA..."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [orgs]
      summary: Regenerate SSH key pair
      description: Generates a new Ed25519 key pair for the organization. The previous key will stop working on remote servers immediately.
      operationId: postOrgSsh
      responses:
        '200':
          description: New SSH public key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /orgs/{organization}/subscribe:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
    get:
      tags: [orgs]
      summary: List cache subscriptions
      description: Returns the binary caches this organization currently uses as substituters.
      operationId: listOrgSubscriptions
      responses:
        '200':
          description: Subscribed caches
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/ListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /orgs/{organization}/subscribe/{cache}:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
      - $ref: '#/components/parameters/CacheSlug'
    post:
      tags: [orgs]
      summary: Subscribe to cache
      description: |
        Adds a binary cache to the organization's list of substituters.
        Requires `manageSubscriptions` on the organization AND `manageCacheSubscriptions` on the cache.
      operationId: subscribeOrgToCache
      responses:
        '200':
          description: Subscribed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [orgs]
      summary: Unsubscribe from cache
      description: |
        Removes a binary cache from the organization's substituters.
        Requires `manageSubscriptions` on the organization AND `manageCacheSubscriptions` on the cache.
      operationId: unsubscribeOrgFromCache
      responses:
        '200':
          description: Unsubscribed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Projects ─────────────────────────────────────────────────────────────────

  /projects/{organization}:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
    get:
      tags: [projects]
      summary: List projects
      description: Returns all projects in the given organization with full details.
      operationId: listProjects
      responses:
        '200':
          description: Project list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        type: array
                        items:
                          $ref: '#/components/schemas/Project'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [projects]
      summary: Create project
      description: Creates a new project in the organization. `wildcard` is a Nix attribute selector such as `packages.x86_64-linux` or `checks`.
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MakeProjectRequest'
            example:
              name: my-project
              display_name: My Project
              repository: "https://github.com/example/repo.git"
              branch: main
              wildcard: "packages.x86_64-linux"
      responses:
        '200':
          description: Project UUID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
              example:
                error: false
                message: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /projects/{organization}/{project}:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
      - $ref: '#/components/parameters/ProjectSlug'
    get:
      tags: [projects]
      summary: Get project
      operationId: getProject
      responses:
        '200':
          description: Project details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/Project'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [projects]
      summary: Update project
      description: Updates one or more project fields.
      operationId: patchProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchProjectRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [projects]
      summary: Delete project
      operationId: deleteProject
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{organization}/{project}/evaluations:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
      - $ref: '#/components/parameters/ProjectSlug'
    get:
      tags: [projects]
      summary: List recent evaluations
      description: Returns the `keep_evaluations` most recent evaluations for the project, newest first.
      operationId: getProjectEvaluations
      security:
        - {}
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          description: Max evaluations to return, newest first. Defaults to the project's keep_evaluations.
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: List of evaluation summaries
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: boolean
                    example: false
                  message:
                    type: array
                    items:
                      $ref: '#/components/schemas/EvaluationSummary'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{organization}/{project}/details:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
      - $ref: '#/components/parameters/ProjectSlug'
    get:
      tags: [projects]
      summary: Get project details
      description: Returns aggregated project data including the latest evaluation, recent evaluation history, and current entry points.
      operationId: getProjectDetails
      responses:
        '200':
          description: Project details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/ProjectDetailsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{organization}/{project}/entry-points:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
      - $ref: '#/components/parameters/ProjectSlug'
    get:
      tags: [projects]
      summary: List entry points
      description: >
        Returns the root builds (entry points) for the project from the last evaluation by default.
        Pass `evaluation_id` to retrieve entry points from a specific evaluation instead.
      operationId: listProjectEntryPoints
      parameters:
        - name: evaluation_id
          in: query
          required: false
          description: UUID of a specific evaluation to retrieve entry points from. Defaults to the project's last evaluation.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Entry points
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        type: array
                        items:
                          $ref: '#/components/schemas/EntryPointSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{organization}/{project}/check-repository:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
      - $ref: '#/components/parameters/ProjectSlug'
    post:
      tags: [projects]
      summary: Check repository accessibility
      description: >-
        Tests whether Gradient can clone the project's repository using the
        organization's SSH key. Requires Admin or Write role; rejects
        state-managed projects.

        Returns `400` with `code: "repository_unreachable"` and the underlying
        git error when the repository cannot be fetched.
      operationId: checkProjectRepository
      responses:
        '200':
          description: Repository is accessible
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '400':
          description: >-
            Bad request - invalid input or repository unreachable
            (`code: "repository_unreachable"`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{organization}/{project}/evaluate:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
      - $ref: '#/components/parameters/ProjectSlug'
    post:
      tags: [projects]
      summary: Trigger evaluation
      description: >-
        Queues a new evaluation for the project. Returns the new evaluation UUID.

        Returns `400` with `code: "repository_unreachable"` when the repository
        cannot be fetched (DNS failure, authentication failure, unreachable host,
        bad URL, …) - the message includes the underlying git error.
      operationId: triggerEvaluation
      responses:
        '200':
          description: Evaluation UUID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
              example:
                error: false
                message: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
        '400':
          description: >-
            Bad request - invalid input, evaluation already in progress, or
            repository unreachable (`code: "repository_unreachable"`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
              example:
                error: true
                code: repository_unreachable
                message: 'Failed to fetch repository state: Git command failed: failed to resolve address for github: Name or service not known'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{organization}/{project}/active:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
      - $ref: '#/components/parameters/ProjectSlug'
    post:
      tags: [projects]
      summary: Enable project
      description: >-
        Sets the project's active flag to true so it will be evaluated on new
        commits. Requires Admin or Write role; rejects state-managed projects.
      operationId: enableProject
      responses:
        '200':
          description: Enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [projects]
      summary: Disable project
      description: >-
        Sets the project's active flag to false, pausing automatic evaluations.
        Requires Admin or Write role; rejects state-managed projects.
      operationId: disableProject
      responses:
        '200':
          description: Disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{organization}/{project}/actions:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
      - $ref: '#/components/parameters/ProjectSlug'
    get:
      tags: [actions]
      summary: List project actions
      operationId: listProjectActions
      responses:
        '200':
          description: List of actions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        type: array
                        items:
                          $ref: '#/components/schemas/Action'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [actions]
      summary: Create project action
      operationId: createProjectAction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateActionRequest'
      responses:
        '200':
          description: Action created; token present only for send_web_request
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/CreateActionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{organization}/{project}/actions/{id}:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
      - $ref: '#/components/parameters/ProjectSlug'
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Action UUID
    get:
      tags: [actions]
      summary: Get project action
      operationId: getProjectAction
      responses:
        '200':
          description: Action (token stripped)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/Action'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [actions]
      summary: Update project action
      operationId: updateProjectAction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateActionRequest'
      responses:
        '200':
          description: Action updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/Action'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [actions]
      summary: Delete project action
      operationId: deleteProjectAction
      responses:
        '200':
          description: Action deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BoolResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{organization}/{project}/actions/{id}/test:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
      - $ref: '#/components/parameters/ProjectSlug'
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Action UUID
    post:
      tags: [actions]
      summary: Fire action now (synthetic test)
      operationId: testProjectAction
      description: >-
        Fires the action immediately with a synthetic test event, bypassing event matching.
        Forge-integration actions (`forge_status_report`, `open_pr`) instead run a non-mutating
        connectivity check against the project's repository, since a synthetic status/PR posted
        against a placeholder commit is always rejected by the forge.
      responses:
        '200':
          description: Action fired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BoolResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{organization}/{project}/actions/{id}/regenerate-token:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
      - $ref: '#/components/parameters/ProjectSlug'
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Action UUID
    post:
      tags: [actions]
      summary: Regenerate send_web_request token
      operationId: regenerateActionToken
      description: Invalidates the current token and returns a new one in plaintext. Only valid for send_web_request actions.
      responses:
        '200':
          description: New token (one-time reveal)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        type: string
                        description: Plaintext token
        '400':
          description: Action is not of type send_web_request
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{organization}/{project}/actions/{id}/deliveries:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
      - $ref: '#/components/parameters/ProjectSlug'
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Action UUID
    get:
      tags: [actions]
      summary: List action deliveries
      operationId: listActionDeliveries
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        '200':
          description: Paginated delivery list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/ActionDelivery'
                          total: { type: integer }
                          limit: { type: integer }
                          offset: { type: integer }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{organization}/{project}/actions/{id}/deliveries/{delivery_id}:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
      - $ref: '#/components/parameters/ProjectSlug'
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Action UUID
      - name: delivery_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Delivery UUID
    get:
      tags: [actions]
      summary: Get action delivery detail
      operationId: getActionDelivery
      responses:
        '200':
          description: Delivery with request/response bodies
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/ActionDeliveryDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{organization}/{project}/metrics:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
      - $ref: '#/components/parameters/ProjectSlug'
    get:
      tags: [projects]
      summary: Get project metrics
      description: Returns per-evaluation metric points for the last `keep_evaluations` completed evaluations.
      operationId: getProjectMetrics
      responses:
        '200':
          description: Project metrics
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/ProjectMetricsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{organization}/{project}/entry-point-metrics:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
      - $ref: '#/components/parameters/ProjectSlug'
    get:
      tags: [projects]
      summary: Get entry point metrics
      description: |-
        Returns per-evaluation build metrics for a single entry point identified by its
        Nix attribute path (`eval`), covering the last `keep_evaluations` completed evaluations.

        The `eval` value is the full Nix attribute path as stored in the database, which may
        contain double-quoted segments for attribute names with special characters
        (e.g. `packages."x86_64-linux".hello`). URL-encode `"` as `%22` in query strings.
      operationId: getEntryPointMetrics
      security: []
      parameters:
        - name: eval
          in: query
          required: true
          description: |-
            Nix attribute path of the entry point, e.g. `packages.x86_64-linux.hello`
            or `packages.%22x86_64-linux%22.hello` (URL-encoded).
          schema:
            type: string
            example: "packages.x86_64-linux.hello"
      responses:
        '200':
          description: Entry point metrics
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/EntryPointMetricsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{organization}/{project}/entry-point-downloads:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
      - $ref: '#/components/parameters/ProjectSlug'
    get:
      tags: [projects]
      summary: Download newest-commit entry point build output
      description: |-
        Serves the named file from `nix-support/hydra-build-products` for the build of
        the given entry point in the project's **newest-commit evaluation**
        (`project.last_evaluation`). Designed as a stable permalink - retriggering an
        older commit does not shadow the latest one. Returns `404` if no evaluation
        has been recorded yet, or if the entry point / file is missing from the
        newest evaluation.

        Authentication:
        - **Public organisations** - no credentials required.
        - **Private organisations** - supply `?token=GRADxxxx` (API key) or a JWT, **or**
          authenticate via `Authorization: Bearer` header / `jwt_token` session cookie.

        The `eval` value may contain double-quoted Nix attribute segments
        (e.g. `packages."x86_64-linux".hello`). URL-encode `"` as `%22`.
      operationId: downloadEntryPointOutput
      security: []
      parameters:
        - name: eval
          in: query
          required: true
          description: |-
            Nix attribute path of the entry point, e.g. `packages.x86_64-linux.hello`.
            URL-encode `"` as `%22` for attributes with special characters.
          schema:
            type: string
            example: "packages.x86_64-linux.hello"
        - name: filename
          in: query
          required: true
          description: Filename as listed in `nix-support/hydra-build-products`.
          schema:
            type: string
            example: "result.tar.gz"
        - name: token
          in: query
          required: false
          description: |-
            API key (`GRADxxxx`) or JWT for authenticating static/permalink URLs.
            Not required when the organisation is public or when a session cookie /
            `Authorization` header is already present.
          schema:
            type: string
            example: "GRADabcdefghijklmnopqrstuvwxyz0123456789..."
      responses:
        '200':
          description: File contents with appropriate `Content-Type` and `Content-Disposition` headers.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{organization}/{project}/badge:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
      - $ref: '#/components/parameters/ProjectSlug'
    get:
      tags: [projects]
      summary: Project status badge (SVG)
      description: |-
        Returns a shields.io-compatible SVG badge reflecting the project's latest
        evaluation status. Designed to be embedded in GitHub READMEs, Grafana
        dashboards, or any tool that renders SVG images from a URL.

        **Badge colours:**
        | Status | Colour | Label |
        |--------|--------|-------|
        | No evaluation yet | grey | `unknown` |
        | Queued / Evaluating / Building | blue | `queued` / `evaluating` / `building` |
        | Completed, all entry-point builds passed | green | `passing` |
        | Completed, some entry-point builds failed | amber | `partial` |
        | Failed | red | `failing` |
        | Aborted | yellow | `aborted` |

        **Authentication:**
        - **Public organisations** - no credentials required. Embed the URL directly.
        - **Private organisations** - supply `?token=GRADxxxx` (API key) or a JWT so the
          image can be fetched by external services without a session cookie.

        Responses include `Cache-Control: no-cache` so badge aggregator CDNs always
        fetch the live status rather than serving a stale image.
      operationId: getProjectBadge
      security: []
      parameters:
        - name: style
          in: query
          required: false
          description: Visual style of the badge.
          schema:
            type: string
            enum: [flat, flat-square]
            default: flat
        - name: label
          in: query
          required: false
          description: Left-side label text.
          schema:
            type: string
            default: build
            example: build
        - name: eval
          in: query
          required: false
          description: |-
            Nix attribute path of a specific entry point, e.g. `packages."x86_64-linux".hello`.
            When provided the badge reflects that entry point's build status from the most
            recent completed evaluation instead of the overall project status.
            URL-encode `"` as `%22` when constructing static links.
          schema:
            type: string
            example: 'packages."x86_64-linux".hello'
        - name: token
          in: query
          required: false
          description: |-
            API key (`GRADxxxx`) or JWT for private organisations.
            Embed in the image URL so external tools can fetch the badge without
            interactive authentication.
          schema:
            type: string
            example: "GRADabcdefghijklmnopqrstuvwxyz0123456789..."
      responses:
        '200':
          description: SVG badge image.
          content:
            image/svg+xml:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Triggers ─────────────────────────────────────────────────────────────────

