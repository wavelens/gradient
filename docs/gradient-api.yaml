                        $ref: '#/components/schemas/ProjectTrigger'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [triggers]
      summary: Delete project trigger
      operationId: deleteProjectTrigger
      responses:
        '200':
          description: Trigger deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BoolResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{organization}/{project}/triggers/{id}/test:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
      - $ref: '#/components/parameters/ProjectSlug'
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Trigger UUID
    post:
      tags: [triggers]
      summary: Manually fire trigger
      operationId: testProjectTrigger
      description: >-
        Resolves the project HEAD and applies the trigger immediately, bypassing
        commit dedup. Returns the apply outcome.
      responses:
        '200':
          description: Trigger apply outcome
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        type: string
                        description: Outcome description
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Flake Input Overrides ─────────────────────────────────────────────────────

  /projects/{organization}/{project}/flake-inputs:
