openapi: 3.1.1
info:
  title: Gradient API
  description: |-
    Gradient is a Nix-based Continuous Integration system. It evaluates Nix flakes,
    schedules derivation builds across remote machines, and exposes build artefacts
    through an integrated binary cache.

    ## Authentication

    Most endpoints require authentication. Three methods are accepted:

    | Method | How to send | How to obtain |
    |---|---|---|
    | JWT (cookie) | `jwt_token` httpOnly cookie | Set automatically on login |
    | JWT (header) | `Authorization: Bearer <token>` | `POST /auth/basic/login` or OIDC flow |
    | API Key | `Authorization: Bearer GRAD<key>` | `POST /user/keys` |

    Cookie auth is the default for browser clients — the `jwt_token` cookie is set
    by the login and OIDC-callback endpoints and cleared on logout. The
    `Authorization` header is accepted as a fallback (e.g. for CI/scripts).

    ### Artefact downloads

    `GET /builds/{build}/download/{filename}` serves build artefacts declared in
    `nix-support/hydra-build-products`. Access is granted when any of the following
    conditions is met:

    - The owning organisation is **public** — no credentials required.
    - A short-lived (1 h) **download token** is supplied via `?token=<download_token>`.
      Obtain one from `GET /builds/{build}/download-token` while authenticated.
      Tokens are scoped to a single build and are safe to embed in URLs.
    - A valid session (`jwt_token` cookie or `Authorization: Bearer` header) belonging
      to a member of the owning organisation.

    ## Common Response Envelope

    Every JSON response is wrapped in a standard envelope:
    ```json
    { "error": false, "message": <payload> }
    ```
    On errors `"error"` is `true` and `"message"` contains the error description.

    ## Nix Binary Cache

    The integrated Nix binary cache lives outside `/api/v1`. Configure Nix with:
    ```
    substituters = https://gradient.example.com/cache/mycache
    trusted-public-keys = gradient.example.com-mycache:...
    ```
    The public key is returned by `GET /api/v1/caches/{cache}/public-key`.

    ## State Management

    Objects whose `managed` field is `true` are controlled by the NixOS module
    configuration and cannot be mutated through the API.
  contact:
    email: info@wavelens.io
  license:
    name: AGPL-3.0-only
    url: https://www.gnu.org/licenses/agpl-3.0.en.html
  version: 0.4.0

externalDocs:
  description: Gradient documentation
  url: https://wavelens.github.io/gradient

servers:
  - url: http://127.0.0.1:3000/api/v1
    description: Local development server
  - url: https://gradient.example.com/api/v1
    description: Production server

tags:
  - name: general
    description: Health check and server configuration
  - name: auth
    description: Authentication — login, register, OAuth/OIDC
  - name: user
    description: Current user profile, API keys, and settings
  - name: orgs
    description: Organization management, members, SSH keys, cache subscriptions
  - name: projects
    description: Project management and evaluation triggers
  - name: evals
    description: Evaluation details, status, and log streaming
  - name: builds
    description: Build details, logs, artefact downloads, and dependency graph
  - name: workers
    description: Worker registration and live status (proto workers connected via WebSocket)
  - name: caches
    description: Binary cache management
  - name: commits
    description: Commit records
  - name: webhooks
    description: Outgoing webhook management (Gradient → external URLs)
  - name: forge-webhooks
    description: Incoming forge webhooks (external forges → Gradient push triggers)
  - name: integrations
    description: Per-organization named forge integrations (inbound HMAC secrets + outbound API credentials)
  - name: admin
    description: Server-wide administrative endpoints. All routes require the caller to have the `superuser` flag.

security:
  - bearerAuth: []

paths:

  # ── General ──────────────────────────────────────────────────────────────────

  /health:
    get:
      tags: [general]
      summary: Health check
      description: Returns `200 ALIVE` when the server is running. Does not require authentication.
      security: []
      operationId: getHealth
      responses:
        '200':
          description: Server is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
              example:
                error: false
                message: "200 ALIVE"

  /config:
    get:
      tags: [general]
      summary: Server configuration
      description: Returns feature flags for the frontend (OIDC enabled, registration disabled, email verification).
      security: []
      operationId: getConfig
      responses:
        '200':
          description: Server configuration
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/ServerConfig'
              example:
                error: false
                message:
                  oidc_enabled: false
                  registration_enabled: false
                  email_verification_enabled: false
                  quic: false

  /proto:
    get:
      tags: [general]
      summary: Binary WebSocket protocol endpoint
      description: |-
        Upgrades the connection to a WebSocket carrying rkyv-encoded binary
        frames. Only available when `GRADIENT_PROTO_ENABLE=true`.

        **Protocol flow**
        1. Client sends `ClientMessage::InitConnection { version, features }`.
        2. Server responds with `ServerMessage::InitAck { version, features }`
           containing the negotiated protocol version and activated feature flags.
        3. Further message types will be added as the protocol evolves.

        Messages are raw rkyv bytes sent as WebSocket binary frames.
        The `/proto` endpoint is always active.
      security: []
      operationId: protoWebSocket
      responses:
        '101':
          description: Switching Protocols — WebSocket upgrade successful
        '404':
          description: Protocol endpoint is disabled (`GRADIENT_PROTO_ENABLE=false`)

  # ── Auth ─────────────────────────────────────────────────────────────────────

  /auth/basic/register:
    post:
      tags: [auth]
      summary: Register a new user
      description: |-
        Creates a new user account. Fails if registration is disabled (OIDC-only mode)
        or if the username/email is already taken. When email verification is enabled,
        a verification email is sent and login is blocked until the address is confirmed.
      security: []
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MakeUserRequest'
            example:
              username: alice
              name: Alice Example
              email: alice@example.com
              password: "correct-horse-battery-staple"
      responses:
        '200':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
              example:
                error: false
                message: "User 3fa85f64-5717-4562-b3fc-2c963f66afa6 created successfully."
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /auth/basic/login:
    post:
      tags: [auth]
      summary: Login with username/password
      description: |-
        Validates credentials and returns a signed JWT. Pass the token as
        `Authorization: Bearer <token>` on subsequent requests.
        `loginname` accepts either the username or the email address.
        Set `remember_me: true` for a long-lived token.
      security: []
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MakeLoginRequest'
            example:
              loginname: alice
              password: "correct-horse-battery-staple"
              remember_me: false
      responses:
        '200':
          description: JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
              example:
                error: false
                message: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/check-username:
    post:
      tags: [auth]
      summary: Check username availability
      description: |-
        Returns `error: false` if the username is valid and not taken, `error: true` otherwise (non-2xx status is not used — always inspect the `error` field).
      security: []
      operationId: checkUsername
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckUsernameRequest'
      responses:
        '200':
          description: Availability result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
              examples:
                available:
                  value: {error: false, message: "Username is available"}
                taken:
                  value: {error: true, message: "Username is already taken"}

  /auth/verify-email:
    get:
      tags: [auth]
      summary: Verify email address
      description: Consumes the one-time token sent in the verification email. Only available when `email_verification_enabled` is true.
      security: []
      operationId: verifyEmail
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: One-time verification token from the email
      responses:
        '200':
          description: Email verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/resend-verification:
    post:
      tags: [auth]
      summary: Resend verification email
      description: Issues a fresh verification token and sends a new email. Only available when email verification is enabled.
      security: []
      operationId: resendVerification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckUsernameRequest'
      responses:
        '200':
          description: Email sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /auth/oauth/authorize:
    get:
      tags: [auth]
      summary: OAuth2 callback (GET)
      description: Handles the authorization code returned by the OAuth2/OIDC provider. Exchanges the code for a JWT token.
      security: []
      operationId: oauthAuthorizeGet
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: Authorization code from the OAuth2 provider
      responses:
        '200':
          description: JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [auth]
      summary: Get OAuth2 authorization URL
      description: Returns the authorization URL to redirect the user to for OIDC login. Requires OIDC to be enabled.
      security: []
      operationId: oauthAuthorizePost
      responses:
        '200':
          description: Authorization URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
              example:
                error: false
                message: "https://accounts.example.com/oauth2/auth?client_id=..."
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/oidc/login:
    get:
      tags: [auth]
      summary: OIDC login redirect
      description: Redirects the browser to the OIDC provider's authorization endpoint (HTTP 302).
      security: []
      operationId: oidcLogin
      responses:
        '302':
          description: Redirect to OIDC provider
          headers:
            Location:
              schema:
                type: string
                format: uri

  /auth/oidc/callback:
    get:
      tags: [auth]
      summary: OIDC callback
      description: |-
        Handles the OIDC provider redirect. Exchanges the authorization code for a JWT
        and redirects the browser to `/account/oidc-callback?token=<jwt>`.
      security: []
      operationId: oidcCallback
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
      responses:
        '302':
          description: Redirect to frontend with token
          headers:
            Location:
              schema:
                type: string
                example: "/account/oidc-callback?token=eyJhbGci..."

  /auth/logout:
    post:
      tags: [auth]
      summary: Logout
      description: Invalidates the current session (no-op for stateless JWTs; present for API completeness).
      operationId: logout
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
              example:
                error: false
                message: "Logout Successfully"

  # ── User ─────────────────────────────────────────────────────────────────────

  /user:
    get:
      tags: [user]
      summary: Get current user
      description: Returns the id, username, display name, and email of the authenticated user.
      operationId: getUser
      responses:
        '200':
          description: User info
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/UserInfoResponse'
              example:
                error: false
                message:
                  id: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                  username: alice
                  name: Alice Example
                  email: alice@example.com
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      tags: [user]
      summary: Delete current user
      description: Permanently deletes the authenticated user and all associated data.
      operationId: deleteUser
      responses:
        '200':
          description: User deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /user/keys:
    get:
      tags: [user]
      summary: List API keys
      description: Returns all API keys belonging to the authenticated user.
      operationId: getUserKeys
      responses:
        '200':
          description: List of API keys
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/ListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [user]
      summary: Create API key
      description: |-
        Creates a new API key. The full key (prefixed with `GRAD`) is returned once —
        it cannot be retrieved again. Use it as `Authorization: Bearer GRAD<key>`.
      operationId: createUserKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiKeyRequest'
      responses:
        '200':
          description: New API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
              example:
                error: false
                message: "GRADabcdef1234567890abcdef1234567890"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [user]
      summary: Delete API key
      description: Deletes the API key with the given name. State-managed keys cannot be deleted.
      operationId: deleteUserKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiKeyRequest'
      responses:
        '200':
          description: Key deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /user/settings:
    get:
      tags: [user]
      summary: Get user settings
      description: Returns the username, display name, and email of the current user.
      operationId: getUserSettings
      responses:
        '200':
          description: User settings
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/GetUserSettingsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags: [user]
      summary: Update user settings
      description: |-
        Updates one or more user profile fields. Only fields that are present in the
        request body are changed. Managed users (created via NixOS config) cannot be
        modified through the API.
      operationId: patchUserSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchUserSettingsRequest'
      responses:
        '200':
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /user/search:
    get:
      tags: [user]
      summary: Search users by username
      description: Returns up to 10 users whose username contains the given query string. Used for autocomplete in member and ownership dialogs.
      operationId: searchUsers
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Username prefix/substring to search for
      responses:
        '200':
          description: Matching users
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              format: uuid
                            username:
                              type: string
                            name:
                              type: string
              example:
                error: false
                message:
                  - id: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                    username: alice
                    name: Alice Example
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ── Organizations ─────────────────────────────────────────────────────────────

  /orgs:
    get:
      tags: [orgs]
      summary: List organizations
      description: Returns all organizations the current user is a member of.
      operationId: listOrgs
      responses:
        '200':
          description: Organization list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        type: array
                        items:
                          $ref: '#/components/schemas/Organization'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags: [orgs]
      summary: Create organization
      description: Creates a new organization owned by the current user.
      operationId: createOrg
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MakeOrganizationRequest'
            example:
              name: my-org
              display_name: My Organization
      responses:
        '200':
          description: Organization UUID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
              example:
                error: false
                message: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /orgs/available:
    get:
      tags: [orgs]
      summary: Check organization name availability
      description: Returns `true` if no organization with the given name exists, `false` if it is already taken.
      operationId: checkOrgNameAvailable
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
          description: Organization name to check
      responses:
        '200':
          description: Availability result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        type: boolean
              example:
                error: false
                message: true
        '401':
          $ref: '#/components/responses/Unauthorized'

  /orgs/{organization}:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
    get:
      tags: [orgs]
      summary: Get organization
      operationId: getOrg
      responses:
        '200':
          description: Organization details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/Organization'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [orgs]
      summary: Update organization
      description: Updates one or more organization fields. Managed organizations cannot be edited via the API.
      operationId: patchOrg
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchOrganizationRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [orgs]
      summary: Delete organization
      description: Permanently deletes the organization and all its resources.
      operationId: deleteOrg
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /orgs/{organization}/users:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
    get:
      tags: [orgs]
      summary: List organization members
      operationId: listOrgUsers
      responses:
        '200':
          description: Member list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        type: array
                        items:
                          $ref: '#/components/schemas/StringListItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [orgs]
      summary: Add member
      description: Adds a user to the organization by username.
      operationId: addOrgUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddUserRequest'
      responses:
        '200':
          description: Member added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    patch:
      tags: [orgs]
      summary: Update member role
      description: Updates the role or permissions of an existing organization member.
      operationId: patchOrgUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddUserRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [orgs]
      summary: Remove member
      description: Removes a user from the organization.
      operationId: removeOrgUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemoveUserRequest'
      responses:
        '200':
          description: Member removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /orgs/{organization}/ssh:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
    get:
      tags: [orgs]
      summary: Get SSH public key
      description: |-
        Returns the SSH public key for the organization. This key must be added to
        each remote build server's `authorized_keys` to allow Gradient to connect.
      operationId: getOrgSsh
      responses:
        '200':
          description: SSH public key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
              example:
                error: false
                message: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAA..."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [orgs]
      summary: Regenerate SSH key pair
      description: Generates a new Ed25519 key pair for the organization. The previous key will stop working on remote servers immediately.
      operationId: postOrgSsh
      responses:
        '200':
          description: New SSH public key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /orgs/{organization}/subscribe:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
    get:
      tags: [orgs]
      summary: List cache subscriptions
      description: Returns the binary caches this organization currently uses as substituters.
      operationId: listOrgSubscriptions
      responses:
        '200':
          description: Subscribed caches
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/ListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /orgs/{organization}/subscribe/{cache}:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
      - $ref: '#/components/parameters/CacheSlug'
    post:
      tags: [orgs]
      summary: Subscribe to cache
      description: Adds a binary cache to the organization's list of substituters.
      operationId: subscribeOrgToCache
      responses:
        '200':
          description: Subscribed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [orgs]
      summary: Unsubscribe from cache
      description: Removes a binary cache from the organization's substituters.
      operationId: unsubscribeOrgFromCache
      responses:
        '200':
          description: Unsubscribed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Projects ─────────────────────────────────────────────────────────────────

  /projects/{organization}:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
    get:
      tags: [projects]
      summary: List projects
      description: Returns all projects in the given organization with full details.
      operationId: listProjects
      responses:
        '200':
          description: Project list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        type: array
                        items:
                          $ref: '#/components/schemas/Project'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [projects]
      summary: Create project
      description: Creates a new project in the organization. `evaluation_wildcard` is a Nix attribute selector such as `packages.x86_64-linux` or `checks`.
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MakeProjectRequest'
            example:
              name: my-project
              display_name: My Project
              repository: "https://github.com/example/repo.git"
              branch: main
              evaluation_wildcard: "packages.x86_64-linux"
      responses:
        '200':
          description: Project UUID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
              example:
                error: false
                message: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /projects/{organization}/{project}:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
      - $ref: '#/components/parameters/ProjectSlug'
    get:
      tags: [projects]
      summary: Get project
      operationId: getProject
      responses:
        '200':
          description: Project details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/Project'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [projects]
      summary: Update project
      description: Updates one or more project fields.
      operationId: patchProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchProjectRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [projects]
      summary: Delete project
      operationId: deleteProject
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{organization}/{project}/evaluations:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
      - $ref: '#/components/parameters/ProjectSlug'
    get:
      tags: [projects]
      summary: List recent evaluations
      description: Returns the `keep_evaluations` most recent evaluations for the project, newest first.
      operationId: getProjectEvaluations
      security:
        - {}
        - cookieAuth: []
        - bearerAuth: []
      responses:
        '200':
          description: List of evaluation summaries
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: boolean
                    example: false
                  message:
                    type: array
                    items:
                      $ref: '#/components/schemas/EvaluationSummary'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{organization}/{project}/details:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
      - $ref: '#/components/parameters/ProjectSlug'
    get:
      tags: [projects]
      summary: Get project details
      description: Returns aggregated project data including the latest evaluation, recent evaluation history, and current entry points.
      operationId: getProjectDetails
      responses:
        '200':
          description: Project details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/ProjectDetailsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{organization}/{project}/entry-points:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
      - $ref: '#/components/parameters/ProjectSlug'
    get:
      tags: [projects]
      summary: List entry points
      description: >
        Returns the root builds (entry points) for the project from the last evaluation by default.
        Pass `evaluation_id` to retrieve entry points from a specific evaluation instead.
      operationId: listProjectEntryPoints
      parameters:
        - name: evaluation_id
          in: query
          required: false
          description: UUID of a specific evaluation to retrieve entry points from. Defaults to the project's last evaluation.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Entry points
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        type: array
                        items:
                          $ref: '#/components/schemas/EntryPointSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{organization}/{project}/check-repository:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
      - $ref: '#/components/parameters/ProjectSlug'
    post:
      tags: [projects]
      summary: Check repository accessibility
      description: Tests whether Gradient can clone the project's repository using the organization's SSH key.
      operationId: checkProjectRepository
      responses:
        '200':
          description: Repository is accessible
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{organization}/{project}/evaluate:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
      - $ref: '#/components/parameters/ProjectSlug'
    post:
      tags: [projects]
      summary: Trigger evaluation
      description: Queues a new evaluation for the project. Returns the new evaluation UUID.
      operationId: triggerEvaluation
      responses:
        '200':
          description: Evaluation UUID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
              example:
                error: false
                message: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{organization}/{project}/active:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
      - $ref: '#/components/parameters/ProjectSlug'
    post:
      tags: [projects]
      summary: Enable project
      description: Sets the project's active flag to true so it will be evaluated on new commits.
      operationId: enableProject
      responses:
        '200':
          description: Enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [projects]
      summary: Disable project
      description: Sets the project's active flag to false, pausing automatic evaluations.
      operationId: disableProject
      responses:
        '200':
          description: Disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{organization}/{project}/integration:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
      - $ref: '#/components/parameters/ProjectSlug'
    get:
      tags: [integrations]
      summary: Get project integration link
      description: >-
        Returns the inbound/outbound integration IDs linked to this project.
        Both fields are `null` when no link exists.
      operationId: getProjectIntegration
      responses:
        '200':
          description: Current link
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/ProjectIntegrationLink'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [integrations]
      summary: Set project integration link
      description: >-
        Upserts the project → org-integration link. Each ID must reference an
        integration in the same organization whose `kind` matches the field
        (inbound/outbound). Pass `null` to unset either side. Requires
        Admin/Write on the project.
      operationId: putProjectIntegration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutProjectIntegrationRequest'
      responses:
        '200':
          description: Link updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/ProjectIntegrationLink'
        '400':
          description: Integration kind mismatch or not in org
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [integrations]
      summary: Remove project integration link
      description: >-
        Removes the project → integration link row entirely. Disables
        commit-status reporting and inbound webhook routing for this project.
      operationId: deleteProjectIntegration
      responses:
        '200':
          description: Link removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BoolResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{organization}/{project}/metrics:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
      - $ref: '#/components/parameters/ProjectSlug'
    get:
      tags: [projects]
      summary: Get project metrics
      description: Returns per-evaluation metric points for the last `keep_evaluations` completed evaluations.
      operationId: getProjectMetrics
      responses:
        '200':
          description: Project metrics
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/ProjectMetricsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{organization}/{project}/entry-point-metrics:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
      - $ref: '#/components/parameters/ProjectSlug'
    get:
      tags: [projects]
      summary: Get entry point metrics
      description: |-
        Returns per-evaluation build metrics for a single entry point identified by its
        Nix attribute path (`eval`), covering the last `keep_evaluations` completed evaluations.

        The `eval` value is the full Nix attribute path as stored in the database, which may
        contain double-quoted segments for attribute names with special characters
        (e.g. `packages."x86_64-linux".hello`). URL-encode `"` as `%22` in query strings.
      operationId: getEntryPointMetrics
      security: []
      parameters:
        - name: eval
          in: query
          required: true
          description: |-
            Nix attribute path of the entry point, e.g. `packages.x86_64-linux.hello`
            or `packages.%22x86_64-linux%22.hello` (URL-encoded).
          schema:
            type: string
            example: "packages.x86_64-linux.hello"
      responses:
        '200':
          description: Entry point metrics
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/EntryPointMetricsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{organization}/{project}/entry-point-downloads:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
      - $ref: '#/components/parameters/ProjectSlug'
    get:
      tags: [projects]
      summary: Download latest entry point build output
      description: |-
        Serves the named file from `nix-support/hydra-build-products` for the most recently
        completed build of the given entry point. Designed as a stable permalink — the URL
        always resolves to the **newest** successful build.

        Authentication:
        - **Public organisations** — no credentials required.
        - **Private organisations** — supply `?token=GRADxxxx` (API key) or a JWT, **or**
          authenticate via `Authorization: Bearer` header / `jwt_token` session cookie.

        The `eval` value may contain double-quoted Nix attribute segments
        (e.g. `packages."x86_64-linux".hello`). URL-encode `"` as `%22`.
      operationId: downloadEntryPointOutput
      security: []
      parameters:
        - name: eval
          in: query
          required: true
          description: |-
            Nix attribute path of the entry point, e.g. `packages.x86_64-linux.hello`.
            URL-encode `"` as `%22` for attributes with special characters.
          schema:
            type: string
            example: "packages.x86_64-linux.hello"
        - name: filename
          in: query
          required: true
          description: Filename as listed in `nix-support/hydra-build-products`.
          schema:
            type: string
            example: "result.tar.gz"
        - name: token
          in: query
          required: false
          description: |-
            API key (`GRADxxxx`) or JWT for authenticating static/permalink URLs.
            Not required when the organisation is public or when a session cookie /
            `Authorization` header is already present.
          schema:
            type: string
            example: "GRADabcdefghijklmnopqrstuvwxyz0123456789..."
      responses:
        '200':
          description: File contents with appropriate `Content-Type` and `Content-Disposition` headers.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{organization}/{project}/badge:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
      - $ref: '#/components/parameters/ProjectSlug'
    get:
      tags: [projects]
      summary: Project status badge (SVG)
      description: |-
        Returns a shields.io-compatible SVG badge reflecting the project's latest
        evaluation status. Designed to be embedded in GitHub READMEs, Grafana
        dashboards, or any tool that renders SVG images from a URL.

        **Badge colours:**
        | Status | Colour | Label |
        |--------|--------|-------|
        | No evaluation yet | grey | `unknown` |
        | Queued / Evaluating / Building | blue | `queued` / `evaluating` / `building` |
        | Completed, all entry-point builds passed | green | `passing` |
        | Completed, some entry-point builds failed | amber | `partial` |
        | Failed | red | `failing` |
        | Aborted | yellow | `aborted` |

        **Authentication:**
        - **Public organisations** — no credentials required. Embed the URL directly.
        - **Private organisations** — supply `?token=GRADxxxx` (API key) or a JWT so the
          image can be fetched by external services without a session cookie.

        Responses include `Cache-Control: no-cache` so badge aggregator CDNs always
        fetch the live status rather than serving a stale image.
      operationId: getProjectBadge
      security: []
      parameters:
        - name: style
          in: query
          required: false
          description: Visual style of the badge.
          schema:
            type: string
            enum: [flat, flat-square]
            default: flat
        - name: label
          in: query
          required: false
          description: Left-side label text.
          schema:
            type: string
            default: build
            example: build
        - name: eval
          in: query
          required: false
          description: |-
            Nix attribute path of a specific entry point, e.g. `packages."x86_64-linux".hello`.
            When provided the badge reflects that entry point's build status from the most
            recent completed evaluation instead of the overall project status.
            URL-encode `"` as `%22` when constructing static links.
          schema:
            type: string
            example: 'packages."x86_64-linux".hello'
        - name: token
          in: query
          required: false
          description: |-
            API key (`GRADxxxx`) or JWT for private organisations.
            Embed in the image URL so external tools can fetch the badge without
            interactive authentication.
          schema:
            type: string
            example: "GRADabcdefghijklmnopqrstuvwxyz0123456789..."
      responses:
        '200':
          description: SVG badge image.
          content:
            image/svg+xml:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Evaluations ──────────────────────────────────────────────────────────────

  /evals/{evaluation}:
    parameters:
      - $ref: '#/components/parameters/EvaluationId'
    get:
      tags: [evals]
      summary: Get evaluation
      description: Returns the evaluation record including status, commit, and timestamps.
      operationId: getEvaluation
      responses:
        '200':
          description: Evaluation
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/Evaluation'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [evals]
      summary: Evaluation action
      description: |-
        Performs an action on the evaluation. Currently the only supported action is
        `"abort"`, which cancels all in-progress and queued builds.
      operationId: postEvaluation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MakeEvaluationRequest'
            example:
              method: abort
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
              example:
                error: false
                message: "Success"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /evals/{evaluation}/builds:
    parameters:
      - $ref: '#/components/parameters/EvaluationId'
    get:
      tags: [evals]
      summary: List evaluation builds
      description: |-
        Returns `.drv` builds associated with the evaluation, sorted by status
        (Building → Queued → Failed → Aborted/DependencyFailed → Completed/Substituted),
        then by display name. Supports optional `limit` and `offset` query parameters
        for pagination.
      operationId: listEvaluationBuilds
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          description: Maximum number of builds to return. Defaults to all.
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Number of builds to skip (after sorting).
      responses:
        '200':
          description: Paginated build list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        type: object
                        properties:
                          builds:
                            type: array
                            items:
                              $ref: '#/components/schemas/BuildItem'
                          total:
                            type: integer
                            description: Total number of builds for this evaluation (before pagination).
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [evals]
      summary: Stream evaluation logs
      description: |-
        Opens a streaming NDJSON response that emits log lines from all currently
        building derivations. Each line is prefixed with the derivation name.
        The stream terminates when all builds are no longer in the `Building` or
        `Queued` state.
      operationId: streamEvaluationLogs
      responses:
        '200':
          description: NDJSON log stream
          content:
            application/x-ndjson:
              schema:
                type: string
                description: One log chunk per line, prefixed with `<name>> `
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /evals/{evaluation}/messages:
    parameters:
      - $ref: '#/components/parameters/EvaluationId'
    get:
      tags: [evals]
      summary: List evaluation messages
      description: |-
        Returns all structured messages (errors, warnings, notices) recorded during
        the evaluation. Each message carries a `level`, a human-readable `message`,
        and an optional `source` tag that identifies where the message originated
        (e.g. `"flake-prefetch"`, `"nix-eval"`, `"nix-eval:<attr>"`, `"db-insert"`).
        Messages scoped to specific entry points list their entry-point UUIDs in
        the `entry_points` array; evaluation-wide messages have an empty array.
      operationId: listEvaluationMessages
      responses:
        '200':
          description: Message list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        type: array
                        items:
                          $ref: '#/components/schemas/EvaluationMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Builds ───────────────────────────────────────────────────────────────────

  /builds:
    post:
      tags: [builds]
      summary: Submit direct build
      description: |-
        Submits a Nix derivation for building without a project. The request is a
        `multipart/form-data` upload with the following fields:

        | Field | Type | Description |
        |---|---|---|
        | `organization` | text | Organization slug |
        | `derivation` | text | Nix attribute path or store path to build |
        | `file:<name>` | file | One or more Nix expression files |

        Returns the evaluation UUID that can be used to track progress.
      operationId: submitDirectBuild
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [organization, derivation]
              properties:
                organization:
                  type: string
                  description: Organization slug
                derivation:
                  type: string
                  description: Nix derivation attribute path
              additionalProperties:
                type: string
                format: binary
                description: Nix expression file (field name must start with `file:`)
      responses:
        '200':
          description: Direct build started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
              example:
                error: false
                message: "Direct build started with evaluation ID: 3fa85f64-5717-4562-b3fc-2c963f66afa6"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /builds/direct/recent:
    get:
      tags: [builds]
      summary: List recent direct builds
      description: Returns up to 20 most recent direct builds across all organizations owned by the current user.
      operationId: getRecentDirectBuilds
      responses:
        '200':
          description: Recent direct builds
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        type: array
                        items:
                          $ref: '#/components/schemas/DirectBuildInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /builds/{build}:
    parameters:
      - $ref: '#/components/parameters/BuildId'
    get:
      tags: [builds]
      summary: Get build
      description: Returns full build details including status, derivation path, architecture, assigned server, and output store paths.
      operationId: getBuild
      responses:
        '200':
          description: Build with outputs
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/BuildWithOutputs'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /builds/{build}/log:
    parameters:
      - $ref: '#/components/parameters/BuildId'
    get:
      tags: [builds]
      summary: Get build log
      description: Returns the complete build log as a single string. Empty string if no log is available yet.
      operationId: getBuildLog
      responses:
        '200':
          description: Build log
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [builds]
      summary: Stream build log
      description: |-
        Opens a streaming NDJSON response that first emits the full existing log,
        then incrementally streams new chunks as they arrive. The stream ends when
        the build leaves the `Building` state.
      operationId: streamBuildLog
      responses:
        '200':
          description: NDJSON log stream
          content:
            application/x-ndjson:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /builds/{build}/graph:
    parameters:
      - $ref: '#/components/parameters/BuildId'
    get:
      tags: [builds]
      summary: Get dependency graph
      description: |-
        Returns the full transitive dependency graph rooted at the given build via BFS,
        capped at 500 nodes. Each edge `source → target` means `source` must be built
        before `target`.
      operationId: getBuildGraph
      responses:
        '200':
          description: Dependency graph
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/BuildGraph'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /builds/{build}/dependencies:
    parameters:
      - $ref: '#/components/parameters/BuildId'
    get:
      tags: [builds]
      summary: List direct dependencies
      description: Returns only the immediate (one-hop) dependencies of the given build.
      operationId: getBuildDependencies
      responses:
        '200':
          description: Direct dependencies
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        type: array
                        items:
                          $ref: '#/components/schemas/DependencyNode'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /builds/{build}/downloads:
    parameters:
      - $ref: '#/components/parameters/BuildId'
    get:
      tags: [builds]
      summary: List build artefacts
      description: |-
        Returns downloadable artefacts declared in the build's
        `nix-support/hydra-build-products` file. Each entry has a file type,
        filename, Nix store path, and file size in bytes.

        Accessible without authentication when the owning organisation is public.
      operationId: getBuildDownloads
      responses:
        '200':
          description: Build artefacts
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        type: array
                        items:
                          $ref: '#/components/schemas/BuildProduct'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /builds/{build}/download-token:
    parameters:
      - $ref: '#/components/parameters/BuildId'
    get:
      tags: [builds]
      summary: Generate a short-lived download token
      description: |-
        Returns a signed JWT that is valid for **1 hour** and grants access to all
        artefact downloads for the specified build. Pass it as `?token=<value>` on
        `GET /builds/{build}/download/{filename}` to share a link without exposing
        long-lived credentials.

        Requires the caller to be a member of the organisation that owns the build.
      operationId: getBuildDownloadToken
      responses:
        '200':
          description: Download token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /builds/{build}/download/{filename}:
    parameters:
      - $ref: '#/components/parameters/BuildId'
      - name: filename
        in: path
        required: true
        schema:
          type: string
        description: Filename as returned by the `/downloads` endpoint
    get:
      tags: [builds]
      summary: Download build artefact
      description: |-
        Streams a build artefact file. `Content-Type` and `Content-Disposition`
        headers are set based on the file extension.

        Access is granted when **any** of the following is satisfied:
        1. The owning organisation is public — no credentials required.
        2. `?token=<download_token>` — a short-lived per-build token from
           `GET /builds/{build}/download-token` (1 h validity, safe to embed in URLs).
        3. `jwt_token` cookie or `Authorization: Bearer` header and the caller is a
           member of the owning organisation.
      operationId: downloadBuildArtefact
      parameters:
        - name: token
          in: query
          required: false
          schema:
            type: string
          description: Short-lived download token obtained from `/download-token`
      security:
        - {}
      responses:
        '200':
          description: File contents
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{organization}/available:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
    get:
      tags: [projects]
      summary: Check project name availability
      description: Returns `true` if no project with the given name exists in the organization, `false` if it is already taken.
      operationId: checkProjectNameAvailable
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
          description: Project name to check
      responses:
        '200':
          description: Availability result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        type: boolean
              example:
                error: false
                message: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Workers ──────────────────────────────────────────────────────────────────

  /orgs/{organization}/workers:
    parameters:
      - name: organization
        in: path
        required: true
        schema:
          type: string
        description: Organization name

    get:
      tags: [workers]
      summary: List registered workers for an organization
      description: |
        Returns all workers registered under this organization (peer), merged with
        live status from the scheduler for currently connected workers.
        Live fields (`architectures`, `system_features`, etc.) are only populated
        for build-capable workers that have sent `WorkerCapabilities`.
      operationId: listOrgWorkers
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Worker list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        type: array
                        items:
                          $ref: '#/components/schemas/OrgWorkerEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [workers]
      summary: Register a worker under an organization
      description: |
        Registers a worker ID under this organization as a peer. Returns a one-time
        plaintext token that the worker operator must add to their worker config.
        The token is shown only once — it cannot be retrieved later.
      operationId: registerOrgWorker
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worker_id, display_name]
              properties:
                worker_id:
                  type: string
                  description: Persistent worker identity string (UUID or human-readable name)
                display_name:
                  type: string
                  description: Human-readable display name for this worker.
                url:
                  type: string
                  nullable: true
                  description: Optional WebSocket URL where the worker listens for incoming server connections. When set, the server connects outbound to this URL.
                token:
                  type: string
                  nullable: true
                  description: >
                    Pre-generated token (output of `openssl rand -base64 48`, exactly 64 standard-base64 characters).
                    When provided the server stores its hash and does NOT return the token in the response.
                    Omit to have the server generate a token — it will be returned once and cannot be retrieved again.
                enable_fetch:
                  type: boolean
                  default: true
                  description: Server-side gate for the worker's `fetch` capability for this registration.
                enable_eval:
                  type: boolean
                  default: true
                  description: Server-side gate for the worker's `eval` capability for this registration.
                enable_build:
                  type: boolean
                  default: true
                  description: Server-side gate for the worker's `build` capability for this registration.
      responses:
        '200':
          description: Worker registered
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/RegisterWorkerResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /orgs/{organization}/workers/{worker_id}:
    parameters:
      - name: organization
        in: path
        required: true
        schema:
          type: string
        description: Organization name
      - name: worker_id
        in: path
        required: true
        schema:
          type: string
        description: Worker ID to unregister

    patch:
      tags: [workers]
      summary: Activate or deactivate a worker registration
      description: |
        Sets the `active` flag on a worker registration. Deactivating a worker
        triggers an immediate re-auth request, causing the worker to be disconnected
        if it is currently connected. Active jobs may be aborted.
      operationId: patchOrgWorker
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                active:
                  type: boolean
                  nullable: true
                  description: Set to false to deactivate the worker, true to reactivate it. Omit to leave unchanged.
                display_name:
                  type: string
                  description: Update the display name. Omit to leave unchanged.
                enable_fetch:
                  type: boolean
                  description: Update the per-registration `fetch` gate. Omit to leave unchanged.
                enable_eval:
                  type: boolean
                  description: Update the per-registration `eval` gate. Omit to leave unchanged.
                enable_build:
                  type: boolean
                  description: Update the per-registration `build` gate. Omit to leave unchanged.
      responses:
        '200':
          description: Worker updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [workers]
      summary: Unregister a worker from an organization
      description: |
        Removes the worker registration. The worker may still be connected until
        it disconnects naturally — it will not be able to reconnect after that.
      operationId: deleteOrgWorker
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Worker unregistered
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Admin ────────────────────────────────────────────────────────────────────

  /admin/workers:
    get:
      tags: [admin, workers]
      summary: List connected workers
      description: |
        Returns all workers currently connected to the server via the `/proto`
        WebSocket, including their capabilities and assigned job counts.

        Requires the caller to have the `superuser` flag, unless the server
        is started with `GRADIENT_GLOBAL_STATS_PUBLIC=true`.
      operationId: listWorkers
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Worker list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        type: array
                        items:
                          $ref: '#/components/schemas/WorkerInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/github-app/manifest:
    post:
      tags: [admin]
      summary: Build GitHub App manifest
      description: |
        Builds a GitHub App manifest pre-filled with this server's URLs,
        permissions, and events, and returns a one-shot CSRF state token plus
        the GitHub URL the browser should POST the manifest to.

        Requires `superuser`. The state token is consumed by the matching
        `GET /admin/github-app/callback` invocation; it expires after 10
        minutes.
      operationId: createGithubAppManifest
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                host:
                  type: string
                  description: GitHub Enterprise host (e.g. `ghe.example.com`). Defaults to `github.com` when omitted or empty.
              example:
                host: github.com
      responses:
        '200':
          description: Manifest, post URL, and CSRF state
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        type: object
                        required: [manifest, post_url, state]
                        properties:
                          manifest:
                            type: object
                            description: GitHub App manifest payload (`name`, `url`, `hook_attributes`, `redirect_url`, `setup_url`, `default_permissions`, `default_events`, `public`).
                          post_url:
                            type: string
                            description: Absolute URL the browser should POST the manifest to (e.g. `https://github.com/settings/apps/new`).
                          state:
                            type: string
                            description: Opaque one-shot CSRF token to be replayed in the callback's `state` query param.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/github-app/callback:
    get:
      tags: [admin]
      summary: GitHub App manifest callback
      description: |
        Receives the redirect from GitHub after the operator submits the
        manifest. Validates the `state` token, exchanges the temporary `code`
        for the App's permanent credentials, stashes them in a one-shot
        in-memory store, and redirects the browser to
        `/admin/github-app?ready=1`.

        Requires `superuser`.
      operationId: githubAppManifestCallback
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: code
          required: true
          schema:
            type: string
          description: Temporary manifest exchange code issued by GitHub.
        - in: query
          name: state
          required: true
          schema:
            type: string
          description: The one-shot CSRF token issued by `POST /admin/github-app/manifest`.
        - in: query
          name: host
          required: false
          schema:
            type: string
          description: GitHub Enterprise host. Must match the host used to build the manifest.
      responses:
        '302':
          description: Redirect to `/admin/github-app?ready=1` on success.
          headers:
            Location:
              schema:
                type: string
                example: /admin/github-app?ready=1
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          description: GitHub rejected the code exchange.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        type: string

  /admin/github-app/credentials:
    get:
      tags: [admin]
      summary: Fetch pending GitHub App credentials
      description: |
        One-shot retrieval of the credentials produced by the most recent
        successful manifest exchange. Calling this endpoint **consumes** the
        pending credentials; a second call returns `404`. Pending entries
        also expire 10 minutes after creation.

        Requires `superuser`.
      operationId: getGithubAppCredentials
      security:
        - bearerAuth: []
      responses:
        '200':
          description: GitHub App credentials (returned exactly once)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        type: object
                        required: [id, slug, html_url, pem, webhook_secret, client_id, client_secret]
                        properties:
                          id:
                            type: integer
                            format: int64
                            description: Numeric GitHub App ID — set as `GRADIENT_GITHUB_APP_ID`.
                          slug:
                            type: string
                            description: GitHub App slug.
                          html_url:
                            type: string
                            description: Public GitHub URL of the App settings page.
                          pem:
                            type: string
                            description: RS256 private key — write to `GRADIENT_GITHUB_APP_PRIVATE_KEY_FILE`.
                          webhook_secret:
                            type: string
                            description: Shared webhook secret — write to `GRADIENT_GITHUB_APP_WEBHOOK_SECRET_FILE`.
                          client_id:
                            type: string
                          client_secret:
                            type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Caches ───────────────────────────────────────────────────────────────────

  /caches:
    get:
      tags: [caches]
      summary: List caches
      description: Returns all binary caches owned by the current user.
      operationId: listCaches
      responses:
        '200':
          description: Cache list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/ListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags: [caches]
      summary: Create cache
      description: Creates a new binary cache with an auto-generated signing key.
      operationId: createCache
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MakeCacheRequest'
            example:
              name: my-cache
              display_name: My Cache
              description: "Packages for my projects"
              priority: 40
      responses:
        '200':
          description: Cache UUID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
              example:
                error: false
                message: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /caches/available:
    get:
      tags: [caches]
      summary: Check cache name availability
      description: Returns `true` if no cache with the given name exists, `false` if it is already taken.
      operationId: checkCacheNameAvailable
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
          description: Cache name to check
      responses:
        '200':
          description: Availability result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        type: boolean
              example:
                error: false
                message: true
        '401':
          $ref: '#/components/responses/Unauthorized'

  /caches/{cache}:
    parameters:
      - $ref: '#/components/parameters/CacheSlug'
    get:
      tags: [caches]
      summary: Get cache
      operationId: getCache
      responses:
        '200':
          description: Cache details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/Cache'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [caches]
      summary: Update cache
      description: Updates one or more cache fields. Managed caches cannot be edited via the API.
      operationId: patchCache
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchCacheRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [caches]
      summary: Delete cache
      description: Deletes the cache. Managed caches cannot be deleted via the API.
      operationId: deleteCache
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /caches/{cache}/active:
    parameters:
      - $ref: '#/components/parameters/CacheSlug'
    post:
      tags: [caches]
      summary: Enable cache
      operationId: enableCache
      responses:
        '200':
          description: Enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [caches]
      summary: Disable cache
      operationId: disableCache
      responses:
        '200':
          description: Disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /caches/{cache}/public:
    parameters:
      - $ref: '#/components/parameters/CacheSlug'
    post:
      tags: [caches]
      summary: Make cache public
      description: Makes the cache visible to all authenticated users.
      operationId: makeCachePublic
      responses:
        '200':
          description: Cache is now public
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [caches]
      summary: Make cache private
      description: Restricts the cache to its owner only.
      operationId: makeCachePrivate
      responses:
        '200':
          description: Cache is now private
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /caches/{cache}/key:
    parameters:
      - $ref: '#/components/parameters/CacheSlug'
    get:
      tags: [caches]
      summary: Get cache secret signing key
      description: |-
        Returns the Nix-format secret signing key string for the cache, e.g.:
        `gradient.example.com-mycache:AAAA...` (base64-encoded 64-byte ed25519 keypair)

        This key is used internally by Gradient to sign store paths uploaded to the cache.
        Keep it secret — do not add it to `nix.conf`.
        To configure Nix clients, use the public key from `GET /caches/{cache}/public-key` instead.
      operationId: getCacheKey
      responses:
        '200':
          description: Cache secret signing key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
              example:
                error: false
                message: "gradient.example.com-mycache:AAAA..."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /caches/{cache}/public-key:
    parameters:
      - $ref: '#/components/parameters/CacheSlug'
    get:
      tags: [caches]
      summary: Get cache public key
      description: |-
        Returns the Nix-format public key string for the cache, e.g.:
        `gradient.example.com-mycache:AAAA...` (base64-encoded 32-byte ed25519 public key)

        Add this value to `trusted-public-keys` in `nix.conf` or NixOS configuration so
        Nix clients can verify signatures on store paths served from this cache.
      operationId: getCachePublicKey
      responses:
        '200':
          description: Cache public key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
              example:
                error: false
                message: "gradient.example.com-mycache:AAAA..."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /caches/{cache}/netrc:
    parameters:
      - $ref: '#/components/parameters/CacheSlug'
    get:
      tags: [caches]
      summary: Get netrc credentials for cache
      description: |-
        Returns a `.netrc` snippet that Nix can use to authenticate against a private cache.

        Format:
        ```
        machine <host>
        login gradient
        password GRAD<api_key>
        ```

        A dedicated API key named `netrc-<cache>` is created on first call and reused on
        subsequent calls, so the returned credentials remain stable. The password is accepted
        as HTTP Basic Auth by the cache-serving endpoints (`/cache/{cache}/...`).

        Intended usage (as root, so Nix daemon can read the file):
        ```
        sudo gradient cache install-netrc --server https://gradient.example.com \
          --token $TOKEN --cache my-cache
        ```
      operationId: getCacheNetrc
      security:
        - bearerAuth: []
      responses:
        '200':
          description: netrc snippet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
              example:
                error: false
                message: "machine gradient.example.com\nlogin gradient\npassword GRADabcdef...\n"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /caches/{cache}/stats:
    parameters:
      - $ref: '#/components/parameters/CacheSlug'
    get:
      tags: [caches]
      summary: Get cache statistics
      description: Returns bandwidth and hit statistics for the cache.
      operationId: getCacheStats
      responses:
        '200':
          description: Cache statistics
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/CacheStats'
        '404':
          $ref: '#/components/responses/NotFound'

  /caches/{cache}/upstreams:
    parameters:
      - $ref: '#/components/parameters/CacheSlug'
    get:
      tags: [caches]
      summary: List upstream caches
      description: Returns all upstream caches configured for this cache (both internal Gradient caches and external binary caches).
      operationId: listCacheUpstreams
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of upstream entries
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        type: array
                        items:
                          $ref: '#/components/schemas/CacheUpstream'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [caches]
      summary: Add upstream cache
      description: |-
        Adds an upstream cache. Two types are supported:

        - **internal** — another Gradient-managed cache (referenced by name). Supports ReadOnly / ReadWrite / WriteOnly modes.
        - **external** — an arbitrary Nix binary cache URL. Always ReadOnly.
      operationId: addCacheUpstream
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddUpstreamRequest'
      responses:
        '200':
          description: Upstream added — returns the new upstream UUID
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        type: string
                        format: uuid
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /caches/{cache}/upstreams/{id}:
    parameters:
      - $ref: '#/components/parameters/CacheSlug'
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Upstream entry UUID
    patch:
      tags: [caches]
      summary: Update upstream cache
      description: |-
        Updates an upstream entry. For external upstreams the mode is always forced to ReadOnly;
        `url` and `public_key` may be updated. For internal upstreams only `mode` and `display_name` apply.
      operationId: patchCacheUpstream
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchUpstreamRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [caches]
      summary: Remove upstream cache
      operationId: deleteCacheUpstream
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StringResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Commits ──────────────────────────────────────────────────────────────────

  /commits/{commit}:
    parameters:
      - name: commit
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Commit UUID
    get:
      tags: [commits]
      summary: Get commit
      description: Returns commit metadata (message, hash, author). Access control is not yet enforced — any authenticated user can fetch any commit.
      operationId: getCommit
      responses:
        '200':
          description: Commit
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/Commit'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Webhooks ─────────────────────────────────────────────────────────────────

  /webhook/{organization}:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
    get:
      tags: [webhooks]
      summary: List webhooks
      description: Returns all webhooks configured for the organization. Requires Admin or Write role.
      operationId: listWebhooks
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of webhooks (secret is never included)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        type: array
                        items:
                          $ref: '#/components/schemas/Webhook'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [webhooks]
      summary: Create webhook
      description: Creates a new webhook for the organization. Requires Admin or Write role.
      operationId: createWebhook
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWebhookRequest'
      responses:
        '200':
          description: Created webhook
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/Webhook'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /webhook/{organization}/{webhook}:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
      - name: webhook
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Webhook UUID
    get:
      tags: [webhooks]
      summary: Get webhook
      description: Returns a single webhook. Requires Admin or Write role. Secret is never returned.
      operationId: getWebhook
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Webhook
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/Webhook'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [webhooks]
      summary: Update webhook
      description: Updates a webhook's name, URL, secret, events, or active state. Requires Admin or Write role.
      operationId: updateWebhook
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWebhookRequest'
      responses:
        '200':
          description: Updated webhook
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/Webhook'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [webhooks]
      summary: Delete webhook
      description: Permanently deletes a webhook. Requires Admin or Write role.
      operationId: deleteWebhook
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Deletion confirmed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        type: boolean
                        example: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /webhook/{organization}/{webhook}/test:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
      - name: webhook
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Webhook UUID
    post:
      tags: [webhooks]
      summary: Send test event
      description: |-
        Sends a `ping` event to the webhook URL to verify delivery. Requires Admin or Write role.

        The request body sent to the webhook URL will be:
        ```json
        { "event": "ping", "data": { "test": true, "webhook_id": "...", "organization": "..." } }
        ```
      operationId: testWebhook
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Test event delivered successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        type: boolean
                        example: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          description: Webhook delivery failed

  # ── Organization integrations ────────────────────────────────────────────────

  /orgs/{organization}/integrations:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
    get:
      tags: [integrations]
      summary: List integrations
      description: List all inbound and outbound integrations in this organization.
      operationId: listOrgIntegrations
      responses:
        '200':
          description: List of integrations
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        type: array
                        items:
                          $ref: '#/components/schemas/Integration'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [integrations]
      summary: Create integration
      description: |-
        Creates a named inbound or outbound integration. `secret` and
        `access_token` are stored encrypted and never returned in responses.
        Name is unique within `(organization, kind)`.

        One **inbound** integration can serve Gitea/Forgejo/GitLab
        simultaneously — the caller picks the forge path segment in the webhook
        URL (`/hooks/gitea/...`, `/hooks/forgejo/...`, `/hooks/gitlab/...`).
        The stored `forge_type` is display metadata only for inbound.

        For **outbound** GitHub integrations, credentials come from the
        server-configured GitHub App, not from `access_token` — create one with
        `forge_type: "github"` and no token.
      operationId: createOrgIntegration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIntegrationRequest'
      responses:
        '200':
          description: Integration created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/Integration'
        '400':
          description: Invalid name / kind / forge_type
        '409':
          description: Name already in use within this kind
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /orgs/{organization}/integrations/{id}:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Integration UUID
    get:
      tags: [integrations]
      summary: Get integration
      operationId: getOrgIntegration
      responses:
        '200':
          description: Integration
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/Integration'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [integrations]
      summary: Update integration
      description: |-
        Patch-updates an integration. Omit a field to leave it unchanged.
        Pass an empty string for `secret` or `access_token` to **clear** it.
      operationId: patchOrgIntegration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchIntegrationRequest'
      responses:
        '200':
          description: Updated integration
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/Integration'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Name already in use within this kind
    delete:
      tags: [integrations]
      summary: Delete integration
      description: >-
        Deletes an integration. Any project `project_integration` rows
        referencing it are cleared via `ON DELETE SET NULL`.
      operationId: deleteOrgIntegration
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BoolResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /orgs/{organization}/github-app:
    parameters:
      - $ref: '#/components/parameters/OrganizationSlug'
    patch:
      tags: [integrations]
      summary: Toggle GitHub App opt-in
      description: >-
        Enables or disables GitHub App deliveries for this organization.
        Rejected with `400` when the server has no GitHub App configured
        (`github_app_available` is false on `GET /orgs/{organization}`).
      operationId: toggleGithubApp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GithubAppToggleRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BoolResponse'
        '400':
          description: GitHub App not configured on this server
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Forge Webhooks (incoming) ────────────────────────────────────────────────

  /hooks/github:
    post:
      tags: [forge-webhooks]
      summary: Receive GitHub App webhook
      description: |-
        Receives events from a configured GitHub App. Payloads are authenticated using
        `X-Hub-Signature-256` HMAC-SHA256 verification against the configured
        `GRADIENT_GITHUB_APP_WEBHOOK_SECRET_FILE`.

        **Handled events:**
        - `push` — triggers an evaluation on any project whose repository URL matches.
        - `installation` / `installation_repositories` — stores or clears the GitHub App
          `installation_id` on the matching Gradient organization.
        - `ping` — always returns 200.

        This endpoint is unauthenticated (verified via HMAC signature).
      operationId: githubAppWebhook
      parameters:
        - name: X-GitHub-Event
          in: header
          required: true
          schema:
            type: string
          description: GitHub event type (e.g. `push`, `installation`, `ping`)
        - name: X-Hub-Signature-256
          in: header
          required: true
          schema:
            type: string
          description: HMAC-SHA256 signature of the body (`sha256=<hex>`)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: GitHub event payload (varies by event type)
      responses:
        '200':
          description: Webhook processed (may include zero queued evaluations)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/WebhookResponse'
        '400':
          description: Malformed payload or unsupported forge
        '401':
          description: Invalid webhook signature
        '404':
          description: Integration not found
        '500':
          description: Internal error
        '503':
          description: GitHub App not configured (GitHub endpoint only)

  /hooks/{forge}/{org}/{integration_name}:
    parameters:
      - name: forge
        in: path
        required: true
        schema:
          type: string
          enum: [gitea, forgejo, gitlab]
        description: >-
          Forge type path segment. Determines the HMAC scheme; does **not**
          filter the integration lookup — a single inbound integration can
          serve all three forges. GitHub deliveries go through
          `POST /hooks/github` (the App webhook) instead.
      - name: org
        in: path
        required: true
        schema:
          type: string
        description: Gradient organization name
      - name: integration_name
        in: path
        required: true
        schema:
          type: string
        description: Name of the inbound integration within the organization
    post:
      tags: [forge-webhooks]
      summary: Receive forge push webhook
      description: |-
        Receives push events for a named inbound integration.
        Authenticated via the integration's stored HMAC secret.

        Signature header by forge:
        - `gitea` / `forgejo`: `X-Gitea-Signature` (HMAC-SHA256 hex)
        - `gitlab`: `X-Gitlab-Token` (plain token comparison)

        On a matching push, queues an evaluation for every active project whose
        `project_integration.inbound_integration` points at this row and whose
        repository URL matches the webhook payload's clone URL.

        This endpoint is unauthenticated (verified via forge-specific signature).
      operationId: forgeWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Forge push event payload
      responses:
        '200':
          description: Webhook processed (may include zero queued evaluations)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      message:
                        $ref: '#/components/schemas/WebhookResponse'
        '400':
          description: Malformed payload or unsupported forge
        '401':
          description: Invalid webhook signature
        '404':
          description: Integration not found
        '500':
          description: Internal error

  # ── Nix Cache Protocol ───────────────────────────────────────────────────────
  # These endpoints live outside /api/v1. The server URL for these is the root,
  # e.g. https://gradient.example.com (no /api/v1 prefix).

x-nix-cache-paths:
  description: |-
    The following Nix binary cache endpoints are served at the root of the server
    (not under `/api/v1`). They implement the Nix binary cache protocol and are
    used by `nix-store --realise`, `nixos-rebuild`, and other Nix clients.

    | Endpoint | Description |
    |---|---|
    | `GET /cache/{cache}/nix-cache-info` | Cache metadata for Nix |
    | `GET /cache/{cache}/{hash}.narinfo` | Path info for a store path |
    | `GET /cache/{cache}/nar/{hash}.nar.zst` | Compressed NAR archive |

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |-
        JWT obtained from `/auth/basic/login`, or an API key prefixed with `GRAD`
        (e.g. `Bearer GRADabcdef...`).

  parameters:
    OrganizationSlug:
      name: organization
      in: path
      required: true
      schema:
        type: string
        pattern: '^[a-z0-9][a-z0-9-]*[a-z0-9]$'
        example: my-org
      description: Organization name (slug)

    ProjectSlug:
      name: project
      in: path
      required: true
      schema:
        type: string
        pattern: '^[a-z0-9][a-z0-9-]*[a-z0-9]$'
        example: my-project
      description: Project name (slug)

    CacheSlug:
      name: cache
      in: path
      required: true
      schema:
        type: string
        example: my-cache
      description: Cache name (slug)

    EvaluationId:
      name: evaluation
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Evaluation UUID

    BuildId:
      name: build
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Build UUID

  responses:
    BadRequest:
      description: Bad request — invalid input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StringResponse'
          example:
            error: true
            message: "Invalid Server Name"

    Unauthorized:
      description: Authentication required or credentials invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StringResponse'
          example:
            error: true
            message: "Unauthorized"

    Forbidden:
      description: Action not permitted (e.g. managed resource)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StringResponse'
          example:
            error: true
            message: "Cannot modify state-managed server."

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StringResponse'
          example:
            error: true
            message: "Organization not found"

    Conflict:
      description: Resource already exists
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StringResponse'
          example:
            error: true
            message: "Server Name already exists"

  schemas:

    # ── Common wrappers ───────────────────────────────────────────────────────

    BaseResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: boolean
          description: "`true` if an error occurred, `false` on success"
        message:
          description: Response payload — type varies by endpoint

    StringResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            message:
              type: string

    BoolResponse:
      allOf:
        - $ref: '#/components/schemas/BaseResponse'
        - type: object
          properties:
            message:
              type: boolean

    RegisterWorkerResponse:
      type: object
      required: [peer_id]
      properties:
        peer_id:
          type: string
          format: uuid
          description: The organization's UUID — used as the peer_id in worker config
        token:
          type: string
          nullable: true
          description: >
            Plaintext token (present only when the server generated it — not present when the caller
            supplied a token in the request). Store securely; it cannot be retrieved again.

    WorkerLiveInfo:
      type: object
      required: [architectures, system_features, max_concurrent_builds, assigned_job_count, draining]
      properties:
        architectures:
          type: array
          items:
            type: string
          description: CPU architectures this worker can build for. Empty for non-build workers.
        system_features:
          type: array
          items:
            type: string
          description: Nix system features advertised by the worker. Empty for non-build workers.
        max_concurrent_builds:
          type: integer
          format: int32
          description: Maximum number of concurrent builds the worker accepts
        assigned_job_count:
          type: integer
          format: int32
          description: Number of jobs currently assigned to this worker
        draining:
          type: boolean
          description: Whether the worker is draining (no new jobs will be dispatched)

    OrgWorkerEntry:
      type: object
      required: [worker_id, display_name, registered_at, active, enable_fetch, enable_eval, enable_build]
      properties:
        worker_id:
          type: string
          description: Persistent worker identity string
        display_name:
          type: string
          description: 'Human-readable display name for this worker. Defaults to "worker".'
        registered_at:
          type: string
          format: date-time
          description: When this worker was registered under the organization
        active:
          type: boolean
          description: Whether the worker is allowed to authenticate and receive jobs
        url:
          type: string
          nullable: true
          description: WebSocket URL where the worker listens for incoming server connections (if configured)
        created_by:
          type: string
          format: uuid
          nullable: true
          description: User who registered this worker. Null for legacy or declarative rows.
        enable_fetch:
          type: boolean
          description: Server-side gate for the worker's `fetch` capability for this registration.
        enable_eval:
          type: boolean
          description: Server-side gate for the worker's `eval` capability for this registration.
        enable_build:
          type: boolean
          description: Server-side gate for the worker's `build` capability for this registration.
        live:
          allOf:
            - $ref: '#/components/schemas/WorkerLiveInfo'
          nullable: true
          description: Present when the worker is currently connected to this server

    WorkerInfo:
      type: object
      required: [id, architectures, system_features, max_concurrent_builds, assigned_job_count, draining]
      properties:
        id:
          type: string
          description: Peer ID of the connected worker (set by the worker at handshake)
        architectures:
          type: array
          items:
            type: string
          description: CPU architectures the worker can build for (e.g. `x86_64-linux`, `aarch64-linux`)
        system_features:
          type: array
          items:
            type: string
          description: Nix system features advertised by the worker (e.g. `kvm`, `big-parallel`)
        max_concurrent_builds:
          type: integer
          format: int32
          description: Maximum number of concurrent builds the worker accepts
        assigned_job_count:
          type: integer
          format: int32
          description: Number of jobs currently assigned to this worker
        draining:
          type: boolean
          description: Whether the worker is draining (no new jobs will be dispatched)

    ListItem:
      type: object
      required: [id, name, managed]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        managed:
          type: boolean
          description: Whether this item is managed declaratively by server configuration

    ListResponse:
      type: array
      items:
        $ref: '#/components/schemas/ListItem'

    StringListItem:
      type: object
      required: [name]
      properties:
        name:
          type: string

    # ── Server config ─────────────────────────────────────────────────────────

    ServerConfig:
      type: object
      required: [oidc_enabled, registration_enabled, email_verification_enabled, quic]
      properties:
        oidc_enabled:
          type: boolean
          description: Whether OIDC/OAuth2 authentication is configured
        registration_enabled:
          type: boolean
          description: Whether new user registration via basic auth is enabled
        email_verification_enabled:
          type: boolean
          description: Whether email verification is required on registration
        quic:
          type: boolean
          description: >-
            Whether the server advertises HTTP/3 (QUIC) support via the reverse
            proxy. Clients may attempt an HTTP/3 upgrade when true. Actual QUIC
            termination is handled by nginx, not the backend.
    # ── Auth ─────────────────────────────────────────────────────────────────

    MakeLoginRequest:
      type: object
      required: [loginname, password]
      properties:
        loginname:
          type: string
          description: Username or email address
          example: alice
        password:
          type: string
          format: password
          example: "correct-horse-battery-staple"
        remember_me:
          type: boolean
          default: false
          description: Request a long-lived token

    MakeUserRequest:
      type: object
      required: [username, name, email, password]
      properties:
        username:
          type: string
          pattern: '^[a-z0-9_-]{3,32}$'
          example: alice
        name:
          type: string
          example: Alice Example
        email:
          type: string
          format: email
          example: alice@example.com
        password:
          type: string
          format: password
          minLength: 8
          example: "correct-horse-battery-staple"

    CheckUsernameRequest:
      type: object
      required: [username]
      properties:
        username:
          type: string
          example: alice

    # ── User ─────────────────────────────────────────────────────────────────

    UserInfoResponse:
      type: object
      required: [id, username, name, email]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        name:
          type: string
        email:
          type: string
          format: email

    GetUserSettingsResponse:
      type: object
      required: [username, name, email, is_oidc, managed]
      properties:
        username:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        is_oidc:
          type: boolean
          description: Whether this user authenticates via OIDC (profile is read-only)
        managed:
          type: boolean
          description: Whether this user is managed declaratively by server configuration

    PatchUserSettingsRequest:
      type: object
      properties:
        username:
          type: string
          pattern: '^[a-z0-9_-]{3,32}$'
        name:
          type: string
        email:
          type: string
          format: email

    ApiKeyRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          description: Human-readable label for the API key
          example: ci-runner

    # ── Organizations ─────────────────────────────────────────────────────────

    MakeOrganizationRequest:
      type: object
      required: [name, display_name]
      properties:
        name:
          type: string
          pattern: '^[a-z0-9][a-z0-9-]*[a-z0-9]$'
          description: Unique slug for the organization
          example: my-org
        display_name:
          type: string
          example: My Organization

    PatchOrganizationRequest:
      type: object
      properties:
        name:
          type: string
          pattern: '^[a-z0-9][a-z0-9-]*[a-z0-9]$'
        display_name:
          type: string

    AddUserRequest:
      type: object
      required: [username]
      properties:
        username:
          type: string
          example: bob

    RemoveUserRequest:
      type: object
      required: [username]
      properties:
        username:
          type: string
          example: bob

    Organization:
      type: object
      required: [id, name, display_name, created_by, created_at, github_app_enabled, github_app_available]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        display_name:
          type: string
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        github_installation_id:
          type: integer
          format: int64
          nullable: true
          description: >-
            GitHub App installation ID bound to this org. Populated automatically
            when the App is installed against the org's GitHub account.
        github_app_enabled:
          type: boolean
          description: >-
            Whether this org has opted into GitHub App deliveries. Toggle via
            `PATCH /orgs/{organization}/github-app`.
        github_app_available:
          type: boolean
          description: >-
            True when the Gradient server has a GitHub App configured at all.
            Clients should hide GitHub-related integration UI when this is
            false.

    # ── Projects ──────────────────────────────────────────────────────────────

    MakeProjectRequest:
      type: object
      required: [name, display_name, repository, evaluation_wildcard]
      properties:
        name:
          type: string
          pattern: '^[a-z0-9][a-z0-9-]*[a-z0-9]$'
          example: my-project
        display_name:
          type: string
          example: My Project
        repository:
          type: string
          description: Git repository URL (SSH or HTTPS)
          example: "git@github.com:example/repo.git"
        branch:
          type: string
          description: Git branch to track (defaults to default branch)
          example: main
        evaluation_wildcard:
          type: string
          description: Nix attribute path to evaluate (e.g. `packages.x86_64-linux` or `checks`)
          example: "packages.x86_64-linux"

    PatchProjectRequest:
      type: object
      properties:
        name:
          type: string
        display_name:
          type: string
        repository:
          type: string
        branch:
          type: string
        evaluation_wildcard:
          type: string
        keep_evaluations:
          type: integer
          minimum: 1
          description: Number of completed evaluations to retain for metrics and history

    Project:
      type: object
      required: [id, name, display_name, organization, repository, evaluation_wildcard, active, created_by, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        display_name:
          type: string
        organization:
          type: string
          format: uuid
        repository:
          type: string
        branch:
          type: string
          nullable: true
        evaluation_wildcard:
          type: string
        active:
          type: boolean
        keep_evaluations:
          type: integer
          description: Number of completed evaluations retained for metrics and history
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    EntryPointSummary:
      type: object
      required: [build_id, name]
      properties:
        build_id:
          type: string
          format: uuid
          description: UUID of the root build
        name:
          type: string
          description: Human-readable derivation name

    EvaluationSummary:
      type: object
      required: [id, commit, status, total_builds, failed_builds, completed_entry_points, failed_entry_points, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        commit:
          type: string
          description: Hex-encoded commit hash
        status:
          $ref: '#/components/schemas/EvaluationStatus'
        total_builds:
          type: integer
          description: Total number of builds in this evaluation
        failed_builds:
          type: integer
          description: Number of failed builds
        completed_entry_points:
          type: integer
          description: Number of entry points with Completed build status
        failed_entry_points:
          type: integer
          description: Number of entry points with Failed build status
        entry_point_diff:
          type: integer
          nullable: true
          description: Difference in entry point count compared to the previous evaluation (null if no previous evaluation)
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ProjectDetailsResponse:
      type: object
      required: [keep_evaluations, recent_evaluations, entry_points]
      properties:
        keep_evaluations:
          type: integer
          description: Number of completed evaluations retained for metrics and history
        latest_evaluation:
          allOf:
            - $ref: '#/components/schemas/EvaluationSummary'
          nullable: true
        recent_evaluations:
          type: array
          items:
            $ref: '#/components/schemas/EvaluationSummary'
        entry_points:
          type: array
          items:
            $ref: '#/components/schemas/EntryPointSummary'

    ProjectMetricsResponse:
      type: object
      required: [keep_evaluations, points]
      properties:
        keep_evaluations:
          type: integer
          description: Configured retention limit for this project
        points:
          type: array
          items:
            $ref: '#/components/schemas/ProjectMetricPoint'

    ProjectMetricPoint:
      type: object
      required: [evaluation_id, created_at, build_time_total_ms, eval_time_ms, dependencies_count]
      properties:
        evaluation_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        build_time_total_ms:
          type: integer
          description: Sum of all completed build durations in milliseconds
        eval_time_ms:
          type: integer
          description: Wall-clock evaluation duration in milliseconds
        output_size_bytes:
          type: integer
          nullable: true
          description: Total size of entry-point output paths (excluding dependencies)
        closure_size_bytes:
          type: integer
          nullable: true
          description: Total closure size including all transitive dependencies
        dependencies_count:
          type: integer
          description: Number of dependency builds (excluding entry points)

    EntryPointMetricsResponse:
      type: object
      required: [eval, keep_evaluations, points]
      properties:
        eval:
          type: string
          description: Nix attribute path of the queried entry point
          example: "packages.x86_64-linux.hello"
        keep_evaluations:
          type: integer
          description: Configured retention limit for this project
        points:
          type: array
          items:
            $ref: '#/components/schemas/EntryPointMetricPoint'

    EntryPointMetricPoint:
      type: object
      required: [evaluation_id, created_at, build_status, dependencies_count]
      properties:
        evaluation_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        build_status:
          $ref: '#/components/schemas/BuildStatus'
        build_time_ms:
          type: integer
          format: int64
          nullable: true
          description: Build duration in milliseconds, null if not yet recorded or build failed
        output_size_bytes:
          type: integer
          format: int64
          nullable: true
          description: Size of this entry point's direct build outputs in bytes
        closure_size_bytes:
          type: integer
          format: int64
          nullable: true
          description: Total closure size including all transitive dependency outputs
        dependencies_count:
          type: integer
          format: int64
          description: Number of transitive dependency builds (excluding the entry point itself)

    # ── Evaluations ───────────────────────────────────────────────────────────

    EvaluationStatus:
      type: string
      enum: [Queued, Fetching, EvaluatingFlake, EvaluatingDerivation, Building, Waiting, Completed, Failed, Aborted]
      description: |-
        | Value | Meaning |
        |---|---|
        | `Queued` | Waiting to start |
        | `Fetching` | Prefetching the Nix flake (cloning / downloading) |
        | `EvaluatingFlake` | Running `nix eval` on the flake |
        | `EvaluatingDerivation` | Resolving derivation paths |
        | `Building` | Builds are in progress |
        | `Waiting` | Waiting for build servers to become available |
        | `Completed` | All builds finished successfully |
        | `Failed` | At least one build failed |
        | `Aborted` | Cancelled by user |

    Evaluation:
      type: object
      required: [id, repository, commit, wildcard, status, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        project:
          type: string
          format: uuid
          nullable: true
          description: Associated project UUID, or null for direct builds
        repository:
          type: string
          description: Repository path or URL that was evaluated
        commit:
          type: string
          format: uuid
          description: Commit record UUID
        wildcard:
          type: string
          description: Nix attribute wildcard that was evaluated
        status:
          $ref: '#/components/schemas/EvaluationStatus'
        previous:
          type: string
          format: uuid
          nullable: true
          description: Previous evaluation in the chain
        next:
          type: string
          format: uuid
          nullable: true
          description: Next evaluation in the chain
        error_count:
          type: integer
          description: Number of error-level messages recorded during evaluation
        warning_count:
          type: integer
          description: Number of warning-level messages recorded during evaluation
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    EvaluationMessage:
      type: object
      required: [id, level, message, created_at, entry_points]
      properties:
        id:
          type: string
          format: uuid
        level:
          type: string
          enum: [Error, Warning, Notice]
          description: Severity level of the message
        message:
          type: string
          description: Human-readable message text
        source:
          type: string
          nullable: true
          description: |
            Origin tag identifying where the message came from.
            Examples: `"flake-prefetch"`, `"nix-eval"`, `"nix-eval:packages.x86_64-linux.hello"`, `"db-insert"`, `"direct-eval"`.
        created_at:
          type: string
          format: date-time
        entry_points:
          type: array
          items:
            type: string
            format: uuid
          description: Entry-point UUIDs this message is attributed to; empty = evaluation-wide

    MakeEvaluationRequest:
      type: object
      required: [method]
      properties:
        method:
          type: string
          enum: [abort]
          description: Action to perform — currently only `abort` is supported

    BuildItem:
      type: object
      required: [id, name, status, updated_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          description: Full derivation store path
        status:
          type: string
          description: Build status string (e.g. `"Queued"`, `"Building"`, `"Succeeded"`)
        updated_at:
          type: string
          format: date-time
          description: Last time the build status changed
        build_time_ms:
          type: integer
          nullable: true
          description: Measured build duration in milliseconds (null if not yet recorded)

    # ── Builds ────────────────────────────────────────────────────────────────

    BuildStatus:
      type: string
      enum: [Queued, Building, Succeeded, Failed, Cancelled]
      description: Current state of a single build

    Architecture:
      type: string
      enum:
        - x86_64-linux
        - aarch64-linux
        - x86_64-darwin
        - aarch64-darwin
        - i686-linux
        - riscv64-linux
      description: Target system architecture

    BuildWithOutputs:
      type: object
      required: [id, evaluation, status, derivation_path, architecture, output, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        evaluation:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/BuildStatus'
        derivation_path:
          type: string
          description: Full Nix store path of the `.drv` file
          example: "/nix/store/abc123-hello-2.12.1.drv"
        architecture:
          $ref: '#/components/schemas/Architecture'
        worker:
          type: string
          nullable: true
          description: |-
            Worker identity (the `worker_id` string the worker sent in
            `InitConnection`) that executed this build. `null` if the
            build has not yet reached a worker (still queued, aborted
            before dispatch, or a pre-migration row).
        output:
          type: object
          additionalProperties:
            type: string
          description: |-
            Map of output name → Nix store path (e.g. `{"out": "/nix/store/xyz-hello-2.12.1"}`)
        created_at:
          type: string
          format: date-time
          description: When the build was created (queued)
        updated_at:
          type: string
          format: date-time
          description: When the build status was last updated

    DependencyNode:
      type: object
      required: [id, name, path, status, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          description: Human-readable derivation name (hash-prefix stripped)
          example: hello-2.12.1
        path:
          type: string
          description: Full Nix store path of the `.drv`
          example: "/nix/store/abc123-hello-2.12.1.drv"
        status:
          type: string
          description: Build status string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    DependencyEdge:
      type: object
      required: [source, target]
      properties:
        source:
          type: string
          format: uuid
          description: Dependency — must be built first
        target:
          type: string
          format: uuid
          description: Build that depends on `source`

    BuildGraph:
      type: object
      required: [root, nodes, edges]
      properties:
        root:
          type: string
          format: uuid
          description: UUID of the root build (the one requested)
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/DependencyNode'
          description: All builds in the transitive graph (max 500)
        edges:
          type: array
          items:
            $ref: '#/components/schemas/DependencyEdge'
          description: Dependency edges (`source` → `target` means source must be built before target)

    BuildProduct:
      type: object
      required: [file_type, name, path]
      properties:
        file_type:
          type: string
          description: Product type from `hydra-build-products` (e.g. `iso`, `tarball`, `doc`)
          example: iso
        name:
          type: string
          description: Filename
          example: nixos-24.11-x86_64-linux.iso
        path:
          type: string
          description: Full Nix store path to the file
          example: "/nix/store/xyz-nixos-iso/nixos-24.11-x86_64-linux.iso"
        size:
          type: integer
          format: int64
          nullable: true
          description: File size in bytes, or null if the file could not be stat'd
          example: 734003200

    DirectBuildInfo:
      type: object
      required: [id, derivation, created_at, evaluation_id, status]
      properties:
        id:
          type: string
          format: uuid
          description: Direct build record UUID
        derivation:
          type: string
          description: Nix derivation attribute path or store path that was submitted
        created_at:
          type: string
          description: Creation timestamp (formatted as `YYYY-MM-DD HH:MM:SS`)
        evaluation_id:
          type: string
          format: uuid
          description: UUID of the evaluation spawned for this direct build
        status:
          type: string
          description: Build status string

    # ── Caches ────────────────────────────────────────────────────────────────

    MakeCacheRequest:
      type: object
      required: [name, display_name, description, priority]
      properties:
        name:
          type: string
          pattern: '^[a-z0-9][a-z0-9-]*[a-z0-9]$'
          example: my-cache
        display_name:
          type: string
          example: My Cache
        description:
          type: string
          example: "Packages for my projects"
        priority:
          type: integer
          description: Nix substituter priority (lower number = higher priority; typical range 1–100)
          default: 40
          example: 40

    PatchCacheRequest:
      type: object
      properties:
        name:
          type: string
        display_name:
          type: string
        description:
          type: string
        priority:
          type: integer

    Cache:
      type: object
      required: [id, name, display_name, description, priority, active, managed, created_by, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        display_name:
          type: string
        description:
          type: string
        priority:
          type: integer
        active:
          type: boolean
          description: Whether the cache is publicly accessible
        managed:
          type: boolean
          description: If true, this cache is controlled by NixOS configuration
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    CacheStats:
      type: object
      properties:
        nar_bytes_served:
          type: integer
          format: int64
          description: Total compressed bytes served from this cache
        hits:
          type: integer
          format: int64
          description: Number of successful narinfo / NAR requests

    CacheUpstream:
      type: object
      required: [id, display_name, mode]
      properties:
        id:
          type: string
          format: uuid
        display_name:
          type: string
        mode:
          type: string
          enum: [read_only, read_write, write_only]
          description: How this cache uses the upstream
        upstream_cache_id:
          type: string
          format: uuid
          nullable: true
          description: Set for internal (Gradient-managed) upstreams
        url:
          type: string
          format: uri
          nullable: true
          description: Set for external upstream binary caches
        public_key:
          type: string
          nullable: true
          description: Nix-format public key used to verify signatures from the external upstream

    AddUpstreamRequest:
      oneOf:
        - title: Internal upstream
          type: object
          required: [type, cache_name]
          properties:
            type:
              type: string
              enum: [internal]
            cache_name:
              type: string
              description: Name of the Gradient-managed cache to use as upstream
            display_name:
              type: string
              nullable: true
            mode:
              type: string
              enum: [read_only, read_write, write_only]
              nullable: true
              description: Defaults to read_write
        - title: External upstream
          type: object
          required: [type, display_name, url, public_key]
          properties:
            type:
              type: string
              enum: [external]
            display_name:
              type: string
            url:
              type: string
              format: uri
              description: URL of the external Nix binary cache
              example: https://cache.nixos.org
            public_key:
              type: string
              description: Nix-format public key for signature verification
              example: "cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY="

    PatchUpstreamRequest:
      type: object
      properties:
        display_name:
          type: string
          nullable: true
        mode:
          type: string
          enum: [read_only, read_write, write_only]
          nullable: true
          description: Only applies to internal upstreams; external upstreams are always read_only
        url:
          type: string
          format: uri
          nullable: true
          description: Only applies to external upstreams
        public_key:
          type: string
          nullable: true
          description: Only applies to external upstreams

    # ── Commits ───────────────────────────────────────────────────────────────

    Commit:
      type: object
      required: [id, message, hash, author_name]
      properties:
        id:
          type: string
          format: uuid
        message:
          type: string
          description: Git commit message
          example: "feat: add dark mode"
        hash:
          type: string
          description: Git SHA-1 hash (hex-encoded)
          example: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2"
        author:
          type: string
          format: uuid
          nullable: true
          description: UUID of the Gradient user who authored the commit (if known)
        author_name:
          type: string
          description: Git author name
          example: Alice Example

    # ── Webhooks ──────────────────────────────────────────────────────────────

    Webhook:
      type: object
      required: [id, organization, name, url, events, active, created_by, created_at]
      properties:
        id:
          type: string
          format: uuid
          description: Webhook UUID
        organization:
          type: string
          format: uuid
          description: Organization UUID
        name:
          type: string
          description: Human-readable webhook name
          example: My Webhook
        url:
          type: string
          format: uri
          description: URL that receives webhook POST requests
          example: https://example.com/hooks/gradient
        events:
          type: array
          description: |-
            List of event types this webhook subscribes to. Supported events:
            - `evaluation.queued` — an evaluation was queued
            - `evaluation.started` — an evaluation began (Evaluating state)
            - `evaluation.building` — an evaluation entered the Building state
            - `evaluation.completed` — an evaluation completed successfully
            - `evaluation.failed` — an evaluation failed
            - `evaluation.aborted` — an evaluation was aborted
            - `build.queued` — a build was queued
            - `build.started` — a build started executing
            - `build.completed` — a build completed successfully
            - `build.failed` — a build failed
          items:
            type: string
            enum:
              - evaluation.queued
              - evaluation.started
              - evaluation.building
              - evaluation.completed
              - evaluation.failed
              - evaluation.aborted
              - build.queued
              - build.started
              - build.completed
              - build.failed
          example: ["evaluation.completed", "build.failed"]
        active:
          type: boolean
          description: Whether the webhook is active and will receive events
          default: true
        created_by:
          type: string
          format: uuid
          description: UUID of the user who created the webhook
        created_at:
          type: string
          format: date-time
          description: Creation timestamp

    CreateWebhookRequest:
      type: object
      required: [name, url, secret, events]
      properties:
        name:
          type: string
          description: Human-readable webhook name
          example: My Webhook
        url:
          type: string
          format: uri
          description: URL to send webhook POST requests to
          example: https://example.com/hooks/gradient
        secret:
          type: string
          description: |-
            HMAC-SHA256 signing secret. Each delivery includes an
            `X-Gradient-Signature: sha256=<hex>` header computed with this secret.
          example: "s3cr3t-webhook-key"
        events:
          type: array
          description: Event types to subscribe to
          items:
            type: string
          example: ["evaluation.completed", "build.failed"]

    UpdateWebhookRequest:
      type: object
      properties:
        name:
          type: string
          description: New name
        url:
          type: string
          format: uri
          description: New URL
        secret:
          type: string
          description: New signing secret
        events:
          type: array
          description: New event subscription list (replaces existing)
          items:
            type: string
        active:
          type: boolean
          description: Enable or disable the webhook

    Integration:
      type: object
      required: [id, organization, name, display_name, kind, forge_type, has_secret, has_access_token, created_by, created_at]
      properties:
        id:
          type: string
          format: uuid
        organization:
          type: string
          format: uuid
        name:
          type: string
          pattern: '^[a-z0-9][a-z0-9-]*[a-z0-9]$'
          example: production
        display_name:
          type: string
          description: Human-readable display name. Defaults to `name` when not set on creation.
          example: Production Webhook
        kind:
          type: string
          enum: [inbound, outbound]
          description: >-
            `inbound` — the forge calls Gradient (HMAC-verified webhook).
            `outbound` — Gradient calls the forge (status reports, etc).
        forge_type:
          type: string
          enum: [gitea, forgejo, gitlab, github]
          description: >-
            Which forge this integration targets. For inbound integrations this
            is display metadata only — a single inbound row can serve
            Gitea/Forgejo/GitLab via the forge path segment of the webhook URL.
        endpoint_url:
          type: string
          nullable: true
          description: Forge base URL (outbound integrations only).
          example: https://gitea.example.com
        has_secret:
          type: boolean
          description: Whether an HMAC secret is stored (inbound integrations).
        has_access_token:
          type: boolean
          description: Whether an API token is stored (outbound integrations).
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    CreateIntegrationRequest:
      type: object
      required: [name, kind, forge_type]
      properties:
        name:
          type: string
          pattern: '^[a-z0-9][a-z0-9-]*[a-z0-9]$'
        display_name:
          type: string
          description: Human-readable display name. Defaults to `name` when omitted.
        kind:
          type: string
          enum: [inbound, outbound]
        forge_type:
          type: string
          enum: [gitea, forgejo, gitlab, github]
        secret:
          type: string
          description: >-
            Plaintext HMAC secret for inbound integrations. Stored encrypted.
            Omit for outbound integrations.
        endpoint_url:
          type: string
          description: Forge base URL for outbound integrations.
        access_token:
          type: string
          description: >-
            Plaintext API token for outbound integrations. Stored encrypted.
            Omit for inbound integrations and for GitHub outbound (credentials
            come from the server-configured GitHub App instead).

    PatchIntegrationRequest:
      type: object
      description: >-
        All fields optional. Omit to leave unchanged. Pass an empty string for
        `secret` or `access_token` to **clear** the stored value.
      properties:
        name:
          type: string
          pattern: '^[a-z0-9][a-z0-9-]*[a-z0-9]$'
        display_name:
          type: string
          description: Update the human-readable display name. Cannot be empty.
        forge_type:
          type: string
          enum: [gitea, forgejo, gitlab, github]
        endpoint_url:
          type: string
          nullable: true
        secret:
          type: string
        access_token:
          type: string

    ProjectIntegrationLink:
      type: object
      required: [project, inbound_integration, outbound_integration]
      properties:
        project:
          type: string
          format: uuid
        inbound_integration:
          type: string
          format: uuid
          nullable: true
        outbound_integration:
          type: string
          format: uuid
          nullable: true

    PutProjectIntegrationRequest:
      type: object
      properties:
        inbound_integration:
          type: string
          format: uuid
          nullable: true
        outbound_integration:
          type: string
          format: uuid
          nullable: true

    GithubAppToggleRequest:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean

    WebhookResponse:
      type: object
      required: [event, repository_urls, projects_scanned, queued, skipped]
      properties:
        event:
          type: string
          example: push
        repository_urls:
          type: array
          items:
            type: string
        projects_scanned:
          type: integer
          format: int32
        queued:
          type: array
          items:
            $ref: '#/components/schemas/QueuedEvaluation'
        skipped:
          type: array
          items:
            $ref: '#/components/schemas/SkippedProject'
    QueuedEvaluation:
      type: object
      required: [project_id, project_name, organization, evaluation_id]
      properties:
        project_id:
          type: string
          format: uuid
        project_name:
          type: string
        organization:
          type: string
        evaluation_id:
          type: string
          format: uuid
    SkippedProject:
      type: object
      required: [project_id, project_name, organization, reason]
      properties:
        project_id:
          type: string
          format: uuid
        project_name:
          type: string
        organization:
          type: string
        reason:
          type: string
          enum: [already_in_progress, no_previous_evaluation, db_error]
